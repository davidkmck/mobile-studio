<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mobile Studio</title>
  
  <style>

/* Apply this to the parent container wrapping your entire app/iframes and the rack */
body, .app-wrapper {
  display: flex;
  flex-direction: column;
  height: 100vh;
  margin: 0;
  overflow: hidden;
  background: #0a0a0f;
}

/* Ensure your iframe container or active subapp area grows to fill all top space */
.content-area, iframe, #app-container {
  flex: 1;          /* Forces it to take up 100% of the remaining top space */
  width: 100%;
  border: none;
  display: block;
}

/* The Fixed Bottom Studio Rack Layout */
.studio-rack {
  position: relative; 
  display: flex;
  justify-content: space-between;
  align-items: stretch;
  background: #0a0a0f;
  padding: 15px 5px 35px 5px; 
  width: 100%;
  box-sizing: border-box;
  flex-shrink: 0; /* CRITICAL: Prevents the rack from collapsing or resizing */
}

/* The Interactive Device Buttons */
.rack-device {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  margin: 0 8px;
  padding: 12px;
  background: #12121c;
  border: 2px solid #26263b;
  border-radius: 8px;
  z-index: 2; 
  text-decoration: none;
  color: #ffffff; 
  min-height: 50px;
}

.rack-device.active {
  background: #1a1a2e;
  border-color: #4f4f7a;
}

/* Ports & SVG Canvas */
.audio-port {
  width: 14px;
  height: 14px;
  background: #050508;
  border: 2px solid #44445c;
  border-radius: 50%;
  position: absolute;
  bottom: -7px; 
  left: 50%;
  transform: translateX(-50%);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
}

.mixer-tab #port-mixer-left { left: 25%; }
.mixer-tab #port-mixer-right { left: 75%; }

.patch-bay-canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none; 
  z-index: 5;
}

.patch-cable {
  fill: none;
  stroke-width: 4.5;
  stroke-linecap: round;
  filter: drop-shadow(0px 4px 3px rgba(0, 0, 0, 0.45)); 
}
.cable-left { stroke: #ff3366; }
.cable-right { stroke: #00e5ff; }

    
:root {
  --cable-left-color: #ff3366;  
  --cable-right-color: #00e5ff; 
  --port-border: #44445c;
}

/* 1. Ensure the bottom rack layout doesn't overlap the app content above it */
.studio-rack {
  position: relative; 
  display: flex;
  justify-content: space-between;
  align-items: stretch; /* Forces all tabs to be equal height */
  background: #0a0a0f;
  padding: 15px 5px 35px 5px; 
  width: 100%;
  box-sizing: border-box;
}

/* 2. Fix the <a> tags so they don't collapse into hidden inline text elements */
.rack-device {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  margin: 0 8px;
  padding: 12px;
  background: #12121c;
  border: 2px solid #26263b;
  border-radius: 8px;
  z-index: 2; 
  
  /* Critical additions for <a> conversion: */
  text-decoration: none;
  color: #ffffff; 
  min-height: 50px; /* Gives it a solid structural tap target */
}

/* 3. Smooth active/tap highlight states */
.rack-device:shadow {
  outline: none;
}
.rack-device.active {
  background: #1a1a2e;
  border-color: #4f4f7a;
}

/* Keep your existing port and canvas styles exactly as they were */
.audio-port {
  width: 14px;
  height: 14px;
  background: #050508;
  border: 2px solid var(--port-border);
  border-radius: 50%;
  position: absolute;
  bottom: -7px; 
  left: 50%;
  transform: translateX(-50%);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
}

.mixer-tab #port-mixer-left { left: 25%; }
.mixer-tab #port-mixer-right { left: 75%; }

.patch-bay-canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none; 
  z-index: 5;
}

.patch-cable {
  fill: none;
  stroke-width: 4.5;
  stroke-linecap: round;
  filter: drop-shadow(0px 4px 3px rgba(0, 0, 0, 0.45)); 
}
.cable-left { stroke: var(--cable-left-color); }
.cable-right { stroke: var(--cable-right-color); }
   

/* Position ports logically */
.drum-kit-tab .audio-out-port { right: 15px; }
.synth-tab .audio-out-port { left: 15px; }
.mixer-tab .left-port { left: 15px; }
.mixer-tab .right-port { right: 15px; }

/* The Cables (Using border-radius to create a droop effect) */
.cable {
  position: absolute;
  border: 4px solid var(--cable-color);
  border-top: none; /* Only show the bottom curved part */
  border-radius: 0 0 50% 50%;
  pointer-events: none; /* Make sure users can still click the tabs underneath */
  z-index: 10;
}

/* Adjust these coordinates to bridge your exact layout layout */
.cable-left {
  left: 20%; 
  width: 25%;
  height: 25px;
  top: 30px;
}

.cable-right {
  right: 20%;
  width: 25%;
  height: 25px;
  top: 30px;
}
    /* previous!
  :root {
    --bg: #0a0a0f;
    --panel: #12121c;
    --border: #26263b;
    --text: #e2e2e9;
    --accent: #00e5ff;
    --nav-height: 60px;
  }
*/
    
  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    overflow: hidden;
    /* dvh accounts for mobile browser chrome (address bar) better than vh */
    height: 100dvh;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* App viewport area: full screen height MINUS the nav bar, so the nav
     never overlaps app content (this is what was hiding controls in
     landscape mode). */
  #app-container {
    width: 100%;
    height: calc(100dvh - var(--nav-height));
    position: relative;
    overflow: hidden;
  }

  .app-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
    position: absolute;
    top: 0;
    left: 0;
  }

  .app-frame.active {
    display: block;
  }

  .global-app-banner {
    display: flex;
    width: 100%;
    height: var(--nav-height);
    flex: 0 0 var(--nav-height);
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .banner-icon {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: #6c6c84;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    border-right: 1px solid var(--border);
    min-height: 48px; /* touch-target friendly */
  }

  .banner-icon:last-child { border-right: none; }

  .banner-icon.active {
    color: var(--accent);
    font-weight: bold;
    background: rgba(0, 229, 255, 0.05);
  }

  /* Landscape: shrink the nav bar a bit so it eats less of the limited
     vertical space, while staying comfortably tappable. */
  @media (max-height: 500px) and (orientation: landscape) {
    :root { --nav-height: 48px; }
    .banner-icon { font-size: 12px; min-height: 40px; }
  }
  </style>
</head>
<body>
  <!-- Sub-app viewport renders here. Each sub-app gets its own persistent
       iframe (never reloaded), shown/hidden via the .active class, so
       playback/recording state survives switching tabs. -->
  <div id="app-container">
    <iframe id="beat-maker" class="app-frame active" src="apps/beat-maker/index.html"></iframe>
    <iframe id="multitrack" class="app-frame" src="apps/multitrack/index.html"></iframe>
    <iframe id="synth" class="app-frame" src="apps/synth/index.html"></iframe>
  </div>

  <!-- Persistent Global Bottom Navigation Banner -->
  <!-- Before 06/30 update...
  <div class="global-app-banner">
    <a href="#" class="banner-icon active" data-app="beat-maker" onclick="loadApp('beat-maker', event)">🎛️ BEAT</a>
    <a href="#" class="banner-icon" data-app="multitrack" onclick="loadApp('multitrack', event)">🎚️ TRACKS</a>
    <a href="#" class="banner-icon" data-app="synth" onclick="loadApp('synth', event)">🎹 SYNTH</a>
  </div>
  -->

    <!-- 06/30 update -->
<div class="studio-rack">
  <!-- BEAT (Drum Kit) -->
  <a href="#" class="rack-device drum-kit-tab active" data-app="beat-maker" onclick="loadApp('beat-maker', event)" id="tab-beat">
    <div class="device-body">🥁 BEAT</div>
    <div class="audio-port out-port" id="port-beat-out"></div>
  </a>

  <!-- TRACKS (The Mixer - Central Hub) -->
  <a href="#" class="rack-device mixer-tab" data-app="multitrack" onclick="loadApp('multitrack', event)" id="tab-tracks">
    <div class="audio-port in-port" id="port-mixer-left"></div>
    <div class="audio-port in-port" id="port-mixer-right"></div>
    <div class="device-body">🎛️ TRACKS</div>
  </a>

  <!-- SYNTH (Keyboard) -->
  <a href="#" class="rack-device synth-tab" data-app="synth" onclick="loadApp('synth', event)" id="tab-synth">
    <div class="audio-port out-port" id="port-synth-out"></div>
    <div class="device-body">🎹 SYNTH</div>
  </a>
  
  <!-- Overlay SVG Canvas for Perfect Cable Droops -->
  <svg class="patch-bay-canvas" xmlns="http://www.w3.org/2000/svg">
    <!-- Left Cable: Drum Kit to Mixer -->
    <path class="patch-cable cable-left" d="M 0 0" />
    <!-- Right Cable: Synth to Mixer -->
    <path class="patch-cable cable-right" d="M 0 0" />
  </svg>
</div>
    <!-- 06/30 update -->

  
  <script>
    let pendingClip = null; // holds audio waiting to be delivered to the Tracks app

    window.addEventListener('message', (event) => {
      const { action, audioBlob, trackName, mimeType, app, bpm } = event.data;

      // 1. Receive from Beat Maker / Synth (legacy blob-based export path)
      if (action === 'EXPORT_AUDIO_TO_TRACKS') {
        console.log("Parent: Received audio. Queuing for Tracks...");
        pendingClip = { action: 'ADD_CLIP_TO_TIMELINE', audioBlob, trackName, mimeType };
      }

      // 2. Navigation — switch which sub-app is visible
      if (action === 'SWITCH_APP') {
        switchApp(app);
      }

      // 3. Global Play Sync (e.g. triggered by Synth recording)
      if (action === 'REQUEST_PLAY') {
        console.log("Parent: Broadcasting START_AUDIO to all apps at BPM:", bpm);
        document.querySelectorAll('.app-frame').forEach(frame => {
          if (frame.contentWindow) {
            frame.contentWindow.postMessage({ action: 'START_AUDIO', bpm }, '*');
          }
        });
      }

      // 4. Global Stop Sync
      if (action === 'REQUEST_STOP') {
        console.log("Parent: Broadcasting STOP_AUDIO to all apps");
        document.querySelectorAll('.app-frame').forEach(frame => {
          if (frame.contentWindow) {
            frame.contentWindow.postMessage({ action: 'STOP_AUDIO' }, '*');
          }
        });
      }

      // 5. Forward raw audio tracks (ArrayBuffer-based handoff) to Tracks
      if (action === 'ADD_TRACK') {
        console.log("Parent received ADD_TRACK, forwarding to Tracks:", trackName);
        const multitrackFrame = document.getElementById('multitrack');
        if (multitrackFrame && multitrackFrame.contentWindow) {
          multitrackFrame.contentWindow.postMessage(event.data, '*');
        }
      }
    });

    function patchStudioCables() {
  const rack = document.querySelector('.studio-rack').getBoundingClientRect();
  
  const getPortCoords = (id) => {
    const el = document.getElementById(id);
    if (!el) return { x: 0, y: 0 };
    const rect = el.getBoundingClientRect();
    // Midpoint calculations relative to the outer container
    return {
      x: rect.left - rack.left + (rect.width / 2),
      y: rect.top - rack.top + (rect.height / 2)
    };
  };

  const pBeatOut = getPortCoords('port-beat-out');
  const pMixerLeft = getPortCoords('port-mixer-left');
  const pMixerRight = getPortCoords('port-mixer-right');
  const pSynthOut = getPortCoords('port-synth-out');

  // Generate cubic curves (Droop depth handled by the 'droop' variable)
  const droop = 45; 

  const drawCable = (pathClass, start, end) => {
    const path = document.querySelector(pathClass);
    if (!path) return;
    const dStr = `M ${start.x} ${start.y} C ${start.x} ${start.y + droop}, ${end.x} ${end.y + droop}, ${end.x} ${end.y}`;
    path.setAttribute('d', dStr);
  };

  drawCable('.cable-left', pBeatOut, pMixerLeft);
  drawCable('.cable-right', pSynthOut, pMixerRight);
}

// Draw paths instantly on load and automatically keep up with orientation flips
window.addEventListener('DOMContentLoaded', patchStudioCables);
window.addEventListener('resize', patchStudioCables);
    
    
    function switchApp(targetAppId) {
      document.querySelectorAll('.app-frame').forEach(frame => frame.classList.remove('active'));
      const activeFrame = document.getElementById(targetAppId);
      if (activeFrame) activeFrame.classList.add('active');

      document.querySelectorAll('.banner-icon').forEach(el => {
        el.classList.toggle('active', el.dataset.app === targetAppId);
      });

      // Deliver any audio clip that was waiting for Tracks to be visible
      if (targetAppId === 'multitrack' && pendingClip && activeFrame) {
        activeFrame.contentWindow.postMessage(pendingClip, '*');
        pendingClip = null;
      }
    }

    function loadApp(appName, event) {
      if (event) event.preventDefault(); // Prevents the href="#" jump
      switchApp(appName);
    }
  </script>
</body>
</html>
