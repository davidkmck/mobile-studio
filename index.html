<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mobile Studio</title>
  
  <style>
    :root {
      --bg: #0a0a0f;
      --panel: #12121c;
      --border: #26263b;
      --nav-height: 110px; /* Increased slightly to give the hardware designs breathing room */
      --cable-left-color: #ff3366;  
      --cable-right-color: #00e5ff; 
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* ==========================================================================
       1. CORE VIEWPORT LAYOUT
       ========================================================================== */
    #app-container {
      width: 100%;
      height: calc(100dvh - var(--nav-height));
      position: relative;
      overflow: hidden;
      flex: 1;
    }

    .app-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: none; 
      position: absolute;
      top: 0;
      left: 0;
    }

    .app-frame.active {
      display: block; 
    }

    /* ==========================================================================
       2. SKEUOMORPHIC HARDWARE STUDIO RACK
       ========================================================================== */
    .studio-rack {
      position: relative; 
      display: flex; 
      width: 100%; 
      height: var(--nav-height);
      background: #1a1a26; 
      border-top: 2px solid #2d2d3f; 
      padding: 8px 6px 24px 6px;
      flex-shrink: 0;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.5);
    }

    /* Base Style for All Hardware Unit Tabs */
    .rack-device {
      position: relative; 
      display: flex; 
      flex-direction: column; 
      justify-content: space-between;
      flex: 1; 
      margin: 0 5px; 
      padding: 6px; 
      background: #0f0f14; 
      border: 1px solid #2d2d3f; 
      border-bottom: 3px solid #08080a;
      border-radius: 6px; 
      z-index: 2; 
      text-decoration: none; 
      color: #8e8eaf;
      overflow: hidden;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    .rack-device.active {
      border-color: #4a4a68;
      border-bottom-color: #1a1a26;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
    }

    .device-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
      margin-bottom: 4px;
      user-select: none;
    }

    .rack-device.active .device-label {
      color: #fff;
      text-shadow: 0 0 8px rgba(255,255,255,0.3);
    }

    /* Hardware Jack Input/Output Sockets */
    .audio-port {
      width: 10px; 
      height: 10px; 
      background: #000000; 
      border: 1.5px solid #565676; 
      border-radius: 50%; 
      position: absolute; 
      bottom: -5px; 
      transform: translateX(-50%); 
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.9); 
      z-index: 4;
    }

    /* ==========================================================================
       3. HARDWARE COMPONENT INTERFACES
       ========================================================================== */
    
    /* --- DRUM KIT (BEAT) --- */
    .drum-interface {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }
    .drum-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2px;
    }
    .drum-screen {
      font-family: monospace;
      font-size: 8px;
      background: #182818;
      color: #39ff14;
      padding: 1px 3px;
      border-radius: 2px;
      border: 1px solid #101a10;
    }
    .drum-knob {
      width: 10px;
      height: 10px;
      background: #2a2a35;
      border: 1px solid #444;
      border-radius: 50%;
      position: relative;
    }
    .drum-knob::after {
      content: '';
      position: absolute;
      top: 1px;
      left: 4px;
      width: 1.5px;
      height: 4px;
      background: #aaa;
    }
    .drum-pads {
      display: grid;
      grid-template-columns: repeat(4, 1xl);
      gap: 3px;
      flex: 1;
    }
    .drum-pad {
      background: #22222e;
      border: 1px solid #333344;
      border-radius: 2px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .rack-device.active .drum-pad {
      border-color: #ff3366;
      background: #2d1620;
    }

    /* --- MIXER BOARD (TRACKS) --- */
    .mixer-interface {
      display: flex;
      justify-content: space-around;
      align-items: stretch;
      flex: 1;
      padding: 2px 4px 0 4px;
      gap: 6px;
    }
    .mixer-channel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      flex: 1;
      position: relative;
    }
    .mixer-knob {
      width: 8px;
      height: 8px;
      background: #3a3a4a;
      border-radius: 50%;
      border: 1px solid #111;
    }
    .mixer-fader-track {
      width: 2px;
      background: #000;
      flex: 1;
      margin: 4px 0;
      position: relative;
      border-radius: 1px;
    }
    .mixer-fader-cap {
      width: 8px;
      height: 4px;
      background: #ccc;
      border: 1px solid #444;
      border-radius: 1px;
      position: absolute;
      left: -3px;
    }
    /* Alternate track positions for reality */
    .ch-1 .mixer-fader-cap { top: 30%; }
    .ch-2 .mixer-fader-cap { top: 60%; }
    .ch-3 .mixer-fader-cap { top: 15%; }
    
    .mixer-led {
      width: 3px;
      height: 3px;
      background: #201010;
      border-radius: 50%;
    }
    .rack-device.active .mixer-led {
      background: #39ff14;
      box-shadow: 0 0 4px #39ff14;
    }

    /* --- KEYBOARD (SYNTH) --- */
    .keyboard-interface {
      display: flex;
      position: relative;
      background: #000;
      height: 24px;
      border-radius: 2px;
      border: 1px solid #222;
      padding-left: 1px;
    }
    .white-key {
      flex: 1;
      background: #e5e5ed;
      border-right: 1px solid #111;
      border-bottom: 2px solid #b5b5bd;
      border-radius: 0 0 1.5px 1.5px;
      height: 100%;
    }
    .white-key:last-child {
      border-right: none;
    }
    .black-keys-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 60%;
      display: flex;
      pointer-events: none;
    }
    .black-gap {
      flex: 1;
    }
    .black-key {
      width: 6px;
      background: #111116;
      border-radius: 0 0 1px 1px;
      margin-left: -3px;
      margin-right: -3px;
      z-index: 3;
      border-bottom: 1px solid #000;
    }

    /* ==========================================================================
       4. SVG CANVAS & FLOATING PATCH CABLES
       ========================================================================== */
    .patch-bay-canvas {
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      pointer-events: none; 
      z-index: 5; 
      overflow: visible; 
    }

    .patch-bay-canvas path {
      fill: none;
      stroke-width: 4px; 
      stroke-linecap: round;
      filter: drop-shadow(0px 4px 3px rgba(0, 0, 0, 0.5));
    }

    .cable-left { stroke: var(--cable-left-color); }
    .cable-right { stroke: var(--cable-right-color); }   
  </style>
</head>
<body>

  <div id="app-container">
    <iframe id="beat-maker" class="app-frame active" src="apps/beat-maker/index.html"></iframe>
    <iframe id="multitrack" class="app-frame" src="apps/multitrack/index.html"></iframe>
    <iframe id="synth" class="app-frame" src="apps/synth/index.html"></iframe>
  </div>

  <div class="studio-rack">
    <!-- BEAT (Drum Kit) -->
    <a href="#" class="rack-device drum-kit-tab active" data-app="beat-maker" onclick="loadApp('beat-maker', event)">
      <div class="device-label">Drum Kit</div>
      <div class="drum-interface">
        <div class="drum-top-row">
          <div class="drum-screen">A01</div>
          <div class="drum-knob"></div>
        </div>
        <div class="drum-pads">
          <div class="drum-pad"></div>
          <div class="drum-pad"></div>
          <div class="drum-pad"></div>
          <div class="drum-pad"></div>
        </div>
      </div>
      <div class="audio-port" style="left: 50%;"></div>
    </a>

    <!-- TRACKS (The Mixer Board) -->
    <a href="#" class="rack-device mixer-tab" data-app="multitrack" onclick="loadApp('multitrack', event)">
      <div class="device-label">Mixer</div>
      <div class="mixer-interface">
        <div class="mixer-channel ch-1">
          <div class="mixer-knob"></div>
          <div class="mixer-fader-track"><div class="mixer-fader-cap"></div></div>
          <div class="mixer-led"></div>
        </div>
        <div class="mixer-channel ch-2">
          <div class="mixer-knob"></div>
          <div class="mixer-fader-track"><div class="mixer-fader-cap"></div></div>
          <div class="mixer-led"></div>
        </div>
        <div class="mixer-channel ch-3">
          <div class="mixer-knob"></div>
          <div class="mixer-fader-track"><div class="mixer-fader-cap"></div></div>
          <div class="mixer-led"></div>
        </div>
      </div>
      <div class="audio-port port-left" style="left: 25%;"></div>
      <div class="audio-port port-right" style="left: 75%;"></div>
    </a>

    <!-- SYNTH (Keyboard) -->
    <a href="#" class="rack-device synth-tab" data-app="synth" onclick="loadApp('synth', event)">
      <div class="device-label">Keyboard</div>
      <div class="keyboard-interface">
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="white-key"></div>
        <div class="black-keys-overlay">
          <div class="black-gap" style="flex: 0.5;"></div>
          <div class="black-key"></div>
          <div class="black-key"></div>
          <div class="black-gap" style="flex: 1.5;"></div>
          <div class="black-key"></div>
          <div class="black-key"></div>
          <div class="black-key"></div>
        </div>
      </div>
      <div class="audio-port" style="left: 50%;"></div>
    </a>
    
    <!-- The Vector Canvas Overlay -->
    <svg class="patch-bay-canvas" xmlns="http://www.w3.org/2000/svg">
      <path class="cable-left" d="M 0 0" />
      <path class="cable-right" d="M 0 0" />
    </svg>
  </div>

  <script>
    let pendingClip = null; 

    window.addEventListener('message', (event) => {
      const { action, audioBlob, trackName, mimeType, app, bpm } = event.data;

      if (action === 'EXPORT_AUDIO_TO_TRACKS') {
        console.log("Parent: Received audio. Queuing for Tracks...");
        pendingClip = { action: 'ADD_CLIP_TO_TIMELINE', audioBlob, trackName, mimeType };
      }

      if (action === 'SWITCH_APP') {
        switchApp(app);
      }

      if (action === 'REQUEST_PLAY') {
        document.querySelectorAll('.app-frame').forEach(frame => {
          if (frame.contentWindow) {
            frame.contentWindow.postMessage({ action: 'START_AUDIO', bpm }, '*');
          }
        });
      }

      if (action === 'REQUEST_STOP') {
        document.querySelectorAll('.app-frame').forEach(frame => {
          if (frame.contentWindow) {
            frame.contentWindow.postMessage({ action: 'STOP_AUDIO' }, '*');
          }
        });
      }

      if (action === 'ADD_TRACK') {
        const multitrackFrame = document.getElementById('multitrack');
        if (multitrackFrame && multitrackFrame.contentWindow) {
          multitrackFrame.contentWindow.postMessage(event.data, '*');
        }
      }
    });

    function drawPatchCables() {
      const rack = document.querySelector('.studio-rack');
      if (!rack) return;
      const rackRect = rack.getBoundingClientRect();
      
      const getPortCenter = (tabClass, portClass) => {
        const tab = document.querySelector(tabClass);
        if (!tab) return { x: 0, y: 0 };
        
        const port = portClass ? tab.querySelector(portClass) : tab.querySelector('.audio-port');
        if (!port) return { x: 0, y: 0 };
        
        const pRect = port.getBoundingClientRect();
        return {
          x: pRect.left - rackRect.left + (pRect.width / 2),
          y: pRect.top - rackRect.top + (pRect.height / 2)
        };
      };

      const startLeft = getPortCenter('.drum-kit-tab');
      const endLeft = getPortCenter('.mixer-tab', '.port-left');
      const startRight = getPortCenter('.synth-tab');
      const endRight = getPortCenter('.mixer-tab', '.port-right');

      const droopAmount = 40; 

      const pathLeft = document.querySelector('.cable-left');
      if (pathLeft) {
        pathLeft.setAttribute('d', `M ${startLeft.x} ${startLeft.y} C ${startLeft.x} ${startLeft.y + droopAmount}, ${endLeft.x} ${endLeft.y + droopAmount}, ${endLeft.x} ${endLeft.y}`);
      }

      const pathRight = document.querySelector('.cable-right');
      if (pathRight) {
        pathRight.setAttribute('d', `M ${startRight.x} ${startRight.y} C ${startRight.x} ${startRight.y + droopAmount}, ${endRight.x} ${endRight.y + droopAmount}, ${endRight.x} ${endRight.y}`);
      }
    }

    window.addEventListener('DOMContentLoaded', drawPatchCables);
    window.addEventListener('load', drawPatchCables);
    window.addEventListener('resize', drawPatchCables);   
    
    function switchApp(targetAppId) {
      document.querySelectorAll('.app-frame').forEach(frame => frame.classList.remove('active'));
      const activeFrame = document.getElementById(targetAppId);
      if (activeFrame) activeFrame.classList.add('active');

      document.querySelectorAll('.rack-device').forEach(el => {
        el.classList.toggle('active', el.dataset.app === targetAppId);
      });

      if (targetAppId === 'multitrack' && pendingClip && activeFrame) {
        activeFrame.contentWindow.postMessage(pendingClip, '*');
        pendingClip = null;
      }
    }

    function loadApp(appName, event) {
      if (event) event.preventDefault(); 
      switchApp(appName);
    }
  </script>
</body>
</html>
