<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mobile Studio</title>
  
  <style>
/* ==========================================================================
   2. WIRED HARDWARE STUDIO RACK (Updated Layout Rules)
   ========================================================================== */
    :root {
  --bg: #0a0a0f;
  --panel: #12121c;
  --border: #26263b;
  --nav-height: 85px; 
  --cable-left-color: #ff3366;  
  --cable-right-color: #00e5ff; 
}
    
/* Base structural layout wrapper */
.studio-rack {
  position: relative; 
  display: flex; 
  width: 100%; 
  height: var(--nav-height);
  background: var(--panel); 
  border-top: 1px solid var(--border); 
  padding: 10px 5px 25px 5px;
  box-sizing: border-box;
}

/* ==========================================================================
   2. WIRED HARDWARE STUDIO RACK
   ========================================================================== */
.rack-device {
  position: relative; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  justify-content: center; 
  flex: 1; 
  margin: 0 8px; 
  background: #0a0a0f; 
  border: 2px solid var(--border); 
  border-radius: 8px; 
  z-index: 2; 
  text-decoration: none; 
  color: #6c6c84; 
  font-size: 13px;
  font-weight: 600;
}

.rack-device.active {
  color: #fff;
  background: #161624; 
  border-color: #4f4f7a; 
}

/* Hardware Jack Ports */
.audio-port {
  width: 12px; 
  height: 12px; 
  background: #000000; 
  border: 2px solid #44445c; 
  border-radius: 50%; 
  position: absolute; 
  bottom: -6px; 
  left: 50%; 
  transform: translateX(-50%); 
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.8); 
}

    /* Adjust twin mixer input positions */
.mixer-tab .port-left { left: 25%; }
.mixer-tab .port-right { left: 75%; }
    
/* Canvas Vector Overlays */
.patch-bay-canvas {
  position: absolute; 
  top: 0; 
  left: 0; 
  width: 100%; 
  height: 100%; 
  pointer-events: none; 
  z-index: 5; 
}

/* Scalable relative stroke paths using viewBox percent vectors */
.patch-bay-canvas path {
  fill: none;
  stroke-width: 1.5; /* Evaluated smoothly relative to 100x100 box space */
  stroke-linecap: round;
}

  .cable-left { 
  stroke: var(--cable-left-color); 
}
.cable-right { 
  stroke: var(--cable-right-color); 
}  

    
  </style>
</head>
<body>
  <!-- Sub-app viewport renders here. Each sub-app gets its own persistent
       iframe (never reloaded), shown/hidden via the .active class, so
       playback/recording state survives switching tabs. -->
  <div id="app-container">
    <iframe id="beat-maker" class="app-frame active" src="apps/beat-maker/index.html"></iframe>
    <iframe id="multitrack" class="app-frame" src="apps/multitrack/index.html"></iframe>
    <iframe id="synth" class="app-frame" src="apps/synth/index.html"></iframe>
  </div>

  <!-- Persistent Global Bottom Navigation Banner -->
  <!-- Before 06/30 update...
  <div class="global-app-banner">
    <a href="#" class="banner-icon active" data-app="beat-maker" onclick="loadApp('beat-maker', event)">🎛️ BEAT</a>
    <a href="#" class="banner-icon" data-app="multitrack" onclick="loadApp('multitrack', event)">🎚️ TRACKS</a>
    <a href="#" class="banner-icon" data-app="synth" onclick="loadApp('synth', event)">🎹 SYNTH</a>
  </div>
  -->

    <!-- 06/30 update -->
<div class="studio-rack">
<!-- BEAT (Drum Kit) -->
  <a href="#" class="rack-device drum-kit-tab active" data-app="beat-maker" onclick="loadApp('beat-maker', event)">
    <div class="device-body">🥁 BEAT</div>
    <div class="audio-port"></div>
  </a>

<!-- TRACKS (The Mixer Board) -->
  <a href="#" class="rack-device mixer-tab" data-app="multitrack" onclick="loadApp('multitrack', event)">
    <!-- Simulated internal connections using structural classes -->
    <div class="audio-port port-left"></div>
    <div class="audio-port port-right"></div>
    <div class="device-body">🎛️ TRACKS</div>
  </a>

<!-- SYNTH (Keyboard) -->
  <a href="#" class="rack-device synth-tab" data-app="synth" onclick="loadApp('synth', event)">
    <div class="audio-port"></div>
    <div class="device-body">🎹 SYNTH</div>
  </a>
  
<!-- CSS Powered Vector Canvas -->
  <svg class="patch-bay-canvas" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Left Cable: Connects roughly 16% (Beat) to 50% (Mixer) using relative grid layout -->
    <path class="cable-left" d="M 16,85 C 16,115 42,115 42,85" />
    <!-- Right Cable: Connects roughly 84% (Synth) to 58% (Mixer) -->
    <path class="cable-right" d="M 84,85 C 84,115 58,115 58,85" />
  </svg>
</div>
    <!-- 06/30 update -->

  
  <script>
    let pendingClip = null; // holds audio waiting to be delivered to the Tracks app

    window.addEventListener('message', (event) => {
      const { action, audioBlob, trackName, mimeType, app, bpm } = event.data;

      // 1. Receive from Beat Maker / Synth (legacy blob-based export path)
      if (action === 'EXPORT_AUDIO_TO_TRACKS') {
        console.log("Parent: Received audio. Queuing for Tracks...");
        pendingClip = { action: 'ADD_CLIP_TO_TIMELINE', audioBlob, trackName, mimeType };
      }

      // 2. Navigation — switch which sub-app is visible
      if (action === 'SWITCH_APP') {
        switchApp(app);
      }

      // 3. Global Play Sync (e.g. triggered by Synth recording)
      if (action === 'REQUEST_PLAY') {
        console.log("Parent: Broadcasting START_AUDIO to all apps at BPM:", bpm);
        document.querySelectorAll('.app-frame').forEach(frame => {
          if (frame.contentWindow) {
            frame.contentWindow.postMessage({ action: 'START_AUDIO', bpm }, '*');
          }
        });
      }

      // 4. Global Stop Sync
      if (action === 'REQUEST_STOP') {
        console.log("Parent: Broadcasting STOP_AUDIO to all apps");
        document.querySelectorAll('.app-frame').forEach(frame => {
          if (frame.contentWindow) {
            frame.contentWindow.postMessage({ action: 'STOP_AUDIO' }, '*');
          }
        });
      }

      // 5. Forward raw audio tracks (ArrayBuffer-based handoff) to Tracks
      if (action === 'ADD_TRACK') {
        console.log("Parent received ADD_TRACK, forwarding to Tracks:", trackName);
        const multitrackFrame = document.getElementById('multitrack');
        if (multitrackFrame && multitrackFrame.contentWindow) {
          multitrackFrame.contentWindow.postMessage(event.data, '*');
        }
      }
    });

    function patchStudioCables() {
  const rack = document.querySelector('.studio-rack').getBoundingClientRect();
  
  const getPortCoords = (id) => {
    const el = document.getElementById(id);
    if (!el) return { x: 0, y: 0 };
    const rect = el.getBoundingClientRect();
    // Midpoint calculations relative to the outer container
    return {
      x: rect.left - rack.left + (rect.width / 2),
      y: rect.top - rack.top + (rect.height / 2)
    };
  };

  const pBeatOut = getPortCoords('port-beat-out');
  const pMixerLeft = getPortCoords('port-mixer-left');
  const pMixerRight = getPortCoords('port-mixer-right');
  const pSynthOut = getPortCoords('port-synth-out');

  // Generate cubic curves (Droop depth handled by the 'droop' variable)
  const droop = 45; 

  const drawCable = (pathClass, start, end) => {
    const path = document.querySelector(pathClass);
    if (!path) return;
    const dStr = `M ${start.x} ${start.y} C ${start.x} ${start.y + droop}, ${end.x} ${end.y + droop}, ${end.x} ${end.y}`;
    path.setAttribute('d', dStr);
  };

  drawCable('.cable-left', pBeatOut, pMixerLeft);
  drawCable('.cable-right', pSynthOut, pMixerRight);
}

// Draw paths instantly on load and automatically keep up with orientation flips
window.addEventListener('DOMContentLoaded', patchStudioCables);
window.addEventListener('resize', patchStudioCables);
    
    
    function switchApp(targetAppId) {
      document.querySelectorAll('.app-frame').forEach(frame => frame.classList.remove('active'));
      const activeFrame = document.getElementById(targetAppId);
      if (activeFrame) activeFrame.classList.add('active');

      document.querySelectorAll('.banner-icon').forEach(el => {
        el.classList.toggle('active', el.dataset.app === targetAppId);
      });

      // Deliver any audio clip that was waiting for Tracks to be visible
      if (targetAppId === 'multitrack' && pendingClip && activeFrame) {
        activeFrame.contentWindow.postMessage(pendingClip, '*');
        pendingClip = null;
      }
    }

    function loadApp(appName, event) {
      if (event) event.preventDefault(); // Prevents the href="#" jump
      switchApp(appName);
    }
  </script>
</body>
</html>
