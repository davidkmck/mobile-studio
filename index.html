<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mobile Studio</title>
  <style>
    body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    /* Main Viewport for Sub-apps */
    #appFrame { flex: 1; border: none; width: 100%; height: 100%; }

    /* The Persistent Bottom App Banner */
    .global-app-banner {
      height: 60px;
      background: #12121c;
      border-top: 1px solid #26263b;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 10px;
      z-index: 9999; /* Always stays on top */
    }
    .banner-icon { color: #6c6c84; cursor: pointer; font-size: 20px; text-decoration: none; }
    .banner-icon.active { color: #00e5ff; font-weight: bold; }
  </style>
</head>
<body>

  <!-- Sub-app viewport renders here -->
  <iframe id="appFrame" src="about:blank"></iframe>

  <!-- Persistent Global Bottom Navigation Banner -->
  <div class="global-app-banner">
    <a href="#" class="banner-icon active" onclick="loadApp('beat-maker')">🎛️ BEAT</a>
    <a href="#" class="banner-icon" onclick="loadApp('multitrack')">🎚️ TRACKS</a>
    <a href="#" class="banner-icon" onclick="loadApp('synth')">🎹 SYNTH</a>
  </div>

  <script>
    const frame = document.getElementById('appFrame');

    // Centralized Storage Managed by the Parent App
    window.addEventListener('message', (event) => {
      const { action, key, value } = event.data;

      if (action === 'SAVE_DATA') {
        localStorage.setItem(key, JSON.stringify(value));
        // Acknowledge save back to the sub-app iframe
        frame.contentWindow.postMessage({ action: 'SAVE_CONFIRMED', key }, '*');
      }

      if (action === 'REQUEST_DATA') {
        const data = JSON.parse(localStorage.getItem(key)) || null;
        frame.contentWindow.postMessage({ action: 'RETURN_DATA', key, data }, '*');
      }
    });

function loadApp(appName) {
  // Highlight current tab banner icon
  document.querySelectorAll('.banner-icon').forEach(el => el.classList.remove('active'));
  
  // Quick safety check for inline clicks
  if (event && event.currentTarget) {
    event.currentTarget.classList.add('active');
  }
  
  //frame.src = `/apps/${appName}/index.html`; 
  frame.src = `${window.location.pathname.replace(/\/$/, '')}/apps/${appName}/index.html`;

}

    // Default init app
    loadApp('beat-maker');
  </script>
</body>
</html>
