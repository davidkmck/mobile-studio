
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mobile Studio</title>
  <style>
  :root {
    --bg: #0a0a0f;
    --panel: #12121c;
    --border: #26263b;
    --text: #e2e2e9;
    --accent: #00e5ff;
  }
  body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  #appFrame { flex: 1; border: none; width: 100%; }
.global-app-banner {
  display: flex;
  width: 100%;
  position: fixed;
  bottom: 0;
  height: 60px;
  background: var(--panel); /* Match the app panel color */
  border-top: 1px solid var(--border);
}
  .banner-icon {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #6c6c84;
    cursor: pointer;
    font-size: 14px; /* Slightly smaller for mobile */
    text-decoration: none;
    border-right: 1px solid var(--border);
  }
  .banner-icon:last-child { border-right: none; }

  .banner-icon.active {
    color: var(--accent);
    font-weight: bold;
    background: rgba(0, 229, 255, 0.05);
  }
    .app-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: none; /* Hide by default */
}

.app-frame.active {
    display: block; /* Show only when active */
}
    #app-container {
    width: 100vw;   /* Full viewport width */
    height: 100vh;  /* Full viewport height */
    position: relative;
    overflow: hidden;
}

.app-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: none; /* Keep hidden by default */
    position: absolute; /* Stack them on top of each other */
    top: 0;
    left: 0;
}

.app-frame.active {
    display: block; /* Show only the active one */
}
    
</style>
</head>
<body>
  <!-- Sub-app viewport renders here -->
<div id="app-container">
  <iframe id="beat-maker" class="app-frame" src="apps/beat-maker/index.html"></iframe>
  <iframe id="multitrack" class="app-frame" src="apps/multitrack/index.html"></iframe>
  <iframe id="synth" class="app-frame" src="apps/synth/index.html"></iframe>
</div>
  
  <!-- Persistent Global Bottom Navigation Banner -->
  <div class="global-app-banner">
    <a href="#" class="banner-icon active" onclick="loadApp('beat-maker', event)">🎛️ BEAT</a>
<a href="#" class="banner-icon" onclick="loadApp('multitrack', event)">🎚️ TRACKS</a>
<a href="#" class="banner-icon" onclick="loadApp('synth', event)">🎹 SYNTH</a>
  </div>
  <script>
    const frame = document.getElementById('appFrame');
    // Centralized Storage Managed by the Parent App
    let pendingClip = null; // holds audio waiting to be delivered to the next app

    window.addEventListener('message', (event) => {
      const { action, audioBlob, trackName, mimeType, app, bpm } = event.data;

      // 1. Receive from Beat Maker
      if (action === 'EXPORT_AUDIO_TO_TRACKS') {
        console.log("Parent: Received audio from Beat Maker. Queuing for Tracks...");
        pendingClip = { action: 'ADD_CLIP_TO_TIMELINE', audioBlob, trackName, mimeType };
      }

      // 2. Navigation — switch sub-app, then deliver any queued clip once it's loaded
      if (action === 'SWITCH_APP') {
        switchApp(app);
      }

      // Listen for the app requesting a global state change
  if (action === 'REQUEST_PLAY') {
    // Broadcast to ALL subapps
    const frames = document.querySelectorAll('#appFrame'); 
    frames.forEach(frame => {
      frame.contentWindow.postMessage({ action: 'START_AUDIO', bpm: bpm }, '*');
    });
  }
    });

    function switchApp(targetAppId) {
    // 1. Hide all frames
    document.querySelectorAll('.app-frame').forEach(frame => {
        frame.classList.remove('active');
    });

    // 2. Show the targeted frame
    const activeFrame = document.getElementById(targetAppId);
    if (activeFrame) {
        activeFrame.classList.add('active');
    }
}

function loadApp(appName, event) {
    if (event) event.preventDefault();

    // 1. Hide all frames, show only the target one
    document.querySelectorAll('.app-frame').forEach(frame => {
        frame.classList.remove('active');
    });
    
    const targetFrame = document.getElementById(appName);
    if (targetFrame) {
        targetFrame.classList.add('active');
    }

    // 2. Handle Pending Clips
    // Instead of waiting for 'onload', you can send the message immediately
    // if you know the app is already loaded in the DOM.
    if (pendingClip) {
        targetFrame.contentWindow.postMessage(pendingClip, '*');
        pendingClip = null;
    }

    // 3. Update UI icons
    document.querySelectorAll('.banner-icon').forEach(el => el.classList.remove('active'));
    // (Logic to highlight the correct icon based on appName...)
}

    // Default init app
    loadApp('beat-maker');
  </script>
</body>
</html>
