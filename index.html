<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mobile Studio</title>
  <style>
  :root {
    --bg: #0a0a0f;
    --panel: #12121c;
    --border: #26263b;
    --text: #e2e2e9;
    --accent: #00e5ff;
    --nav-height: 60px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    overflow: hidden;
    /* dvh accounts for mobile browser chrome (address bar) better than vh */
    height: 100dvh;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* App viewport area: full screen height MINUS the nav bar, so the nav
     never overlaps app content (this is what was hiding controls in
     landscape mode). */
  #app-container {
    width: 100%;
    height: calc(100dvh - var(--nav-height));
    position: relative;
    overflow: hidden;
  }

  .app-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
    position: absolute;
    top: 0;
    left: 0;
  }

  .app-frame.active {
    display: block;
  }

  .global-app-banner {
    display: flex;
    width: 100%;
    height: var(--nav-height);
    flex: 0 0 var(--nav-height);
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .banner-icon {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: #6c6c84;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    border-right: 1px solid var(--border);
    min-height: 48px; /* touch-target friendly */
  }

  .banner-icon:last-child { border-right: none; }

  .banner-icon.active {
    color: var(--accent);
    font-weight: bold;
    background: rgba(0, 229, 255, 0.05);
  }

  /* Landscape: shrink the nav bar a bit so it eats less of the limited
     vertical space, while staying comfortably tappable. */
  @media (max-height: 500px) and (orientation: landscape) {
    :root { --nav-height: 48px; }
    .banner-icon { font-size: 12px; min-height: 40px; }
  }
  </style>
</head>
<body>
  <!-- Sub-app viewport renders here. Each sub-app gets its own persistent
       iframe (never reloaded), shown/hidden via the .active class, so
       playback/recording state survives switching tabs. -->
  <div id="app-container">
    <iframe id="beat-maker" class="app-frame active" src="apps/beat-maker/index.html"></iframe>
    <iframe id="multitrack" class="app-frame" src="apps/multitrack/index.html"></iframe>
    <iframe id="synth" class="app-frame" src="apps/synth/index.html"></iframe>
  </div>

  <!-- Persistent Global Bottom Navigation Banner -->
  <div class="global-app-banner">
    <a href="#" class="banner-icon active" data-app="beat-maker" onclick="loadApp('beat-maker', event)">🎛️ BEAT</a>
    <a href="#" class="banner-icon" data-app="multitrack" onclick="loadApp('multitrack', event)">🎚️ TRACKS</a>
    <a href="#" class="banner-icon" data-app="synth" onclick="loadApp('synth', event)">🎹 SYNTH</a>
  </div>

  <script>
    let pendingClip = null; // holds audio waiting to be delivered to the Tracks app

    window.addEventListener('message', (event) => {
      const { action, audioBlob, trackName, mimeType, app, bpm } = event.data;

      // 1. Receive from Beat Maker / Synth (legacy blob-based export path)
      if (action === 'EXPORT_AUDIO_TO_TRACKS') {
        console.log("Parent: Received audio. Queuing for Tracks...");
        pendingClip = { action: 'ADD_CLIP_TO_TIMELINE', audioBlob, trackName, mimeType };
      }

      // 2. Navigation — switch which sub-app is visible
      if (action === 'SWITCH_APP') {
        switchApp(app);
      }

      // 3. Global Play Sync (e.g. triggered by Synth recording)
      if (action === 'REQUEST_PLAY') {
        console.log("Parent: Broadcasting START_AUDIO to all apps at BPM:", bpm);
        document.querySelectorAll('.app-frame').forEach(frame => {
          if (frame.contentWindow) {
            frame.contentWindow.postMessage({ action: 'START_AUDIO', bpm }, '*');
          }
        });
      }

      // 4. Global Stop Sync
      if (action === 'REQUEST_STOP') {
        console.log("Parent: Broadcasting STOP_AUDIO to all apps");
        document.querySelectorAll('.app-frame').forEach(frame => {
          if (frame.contentWindow) {
            frame.contentWindow.postMessage({ action: 'STOP_AUDIO' }, '*');
          }
        });
      }

      // 5. Forward raw audio tracks (ArrayBuffer-based handoff) to Tracks
      if (action === 'ADD_TRACK') {
        console.log("Parent received ADD_TRACK, forwarding to Tracks:", trackName);
        const multitrackFrame = document.getElementById('multitrack');
        if (multitrackFrame && multitrackFrame.contentWindow) {
          multitrackFrame.contentWindow.postMessage(event.data, '*');
        }
      }
    });

    function switchApp(targetAppId) {
      document.querySelectorAll('.app-frame').forEach(frame => frame.classList.remove('active'));
      const activeFrame = document.getElementById(targetAppId);
      if (activeFrame) activeFrame.classList.add('active');

      document.querySelectorAll('.banner-icon').forEach(el => {
        el.classList.toggle('active', el.dataset.app === targetAppId);
      });

      // Deliver any audio clip that was waiting for Tracks to be visible
      if (targetAppId === 'multitrack' && pendingClip && activeFrame) {
        activeFrame.contentWindow.postMessage(pendingClip, '*');
        pendingClip = null;
      }
    }

    function loadApp(appName, event) {
      if (event) event.preventDefault(); // Prevents the href="#" jump
      switchApp(appName);
    }
  </script>
</body>
</html>
