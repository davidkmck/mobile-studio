<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mixer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <h1>Mixer</h1>
    <div class="subtitle">Bring your tracks together</div>

    <div id="controls-sector">
      <div class="button-group">
        <button id="master-play-btn" disabled>▶️ Play Mix</button>
        <button id="reset-btn" disabled>⏮️ Restart</button>
        <button id="recordBtn">🔴 Record from Mic</button>
        <button id="settings-toggle-btn">⚙️ Settings</button>
      </div>
      
      <input type="file" id="audio-file-input" accept="audio/*" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">

      <div id="settingsPanel" class="settings-panel">
        <div class="slider-label">
          <span>⏱️ Mic alignment latency</span>
          <span id="latency-val">80ms</span>
        </div>
        <input type="range" id="latency-slider" min="0" max="250" step="5" value="80">

        <div class="toggle-container">
          <div class="toggle-label-group">🔁 Loop</div>
          <label class="switch">
            <input type="checkbox" id="loopToggle">
            <span class="slider-toggle"></span>
          </label>
        </div>
      </div>
    </div>

    <section class="mixer-board" id="mixer-board"></section>

    <div class="bottom-actions-container">
      <button id="save-mix-btn" disabled>💾 Save Mix</button>
    </div>
  </main>
<script src="script.js"></script>
</body>
</html>
