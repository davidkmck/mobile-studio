
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mixer</title>
  <!-- 🚀 ADD THIS SCRIPT TAG TO IMPORT TONE.JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --panel: #12121c;
  --card-bg: #1a1a2e; /* Added to support track-row backgrounds */
  --border: #26263b;
  --text: #e2e2e9;
  --text-dim: #6c6c84;
  --accent: #00e5ff;
  --accent-alt: #9d4edd;
  
  /* Status Colors mapped to fit your cyberpunk style */
  --danger: #ef4444;
  --warning: #f59e0b;
  --success: #10b981;
}

* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
}

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  padding: 20px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Consolidated Duplicate Button Styles */
button {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 15px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  font-size: 0.95rem;
  transition: background-color 0.2s, opacity 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.container {
  width: 100%;
  max-width: 950px;
  margin: 0 auto;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 15px;
  flex-grow: 1;
}    

main {
  width: 100%;
  /* Removed restrictive max-width to let app containers utilize desktop space correctly */
  margin: 0 auto;
}

h1 {
  text-align: center;
  font-size: 1.75rem;
  margin-bottom: 5px;
}

.subtitle {
  text-align: center;
  color: #94a3b8;
  font-size: 0.9rem;
  margin-bottom: 25px;
}

#controls-sector {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 30px;
}

.button-group {
  display: flex;
  gap: 10px;
  width: 100%;
}

.btn-record {
  background-color: var(--accent);
  color: #000; /* Contrast black text against glowing cyan */
  flex: none;
  width: 100%;
}

.btn-countdown {
  background-color: var(--warning);
  color: white;
  flex: none;
  width: 100%;
}

.btn-recording {
  background-color: var(--danger);
  animation: pulse 1.5s infinite;
  color: white;
  flex: none;
  width: 100%;
}

.btn-global {
  background-color: #475569;
  color: white;
  flex: 1;
}

.btn-vault {
  background-color: #8b5cf6;
  color: white;
  width: 100%;
  flex: none;
}

.btn-save {
  background-color: var(--success);
  color: white;
  flex: none;
  width: 100%;
}

.toggle-container {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background-color: var(--card-bg);
  padding: 12px 15px;
  border-radius: 8px;
  margin-top: 5px;
  font-weight: 600;
  font-size: 0.95rem;
}

.toggle-label-group {
  display: flex;
  align-items: center;
  gap: 8px;
}

.switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 26px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider-toggle {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #475569;
  transition: .3s;
  border-radius: 34px;
}

.slider-toggle:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  transition: .3s;
  border-radius: 50%;
}

input:checked + .slider-toggle {
  background-color: var(--accent);
}

input:checked + .slider-toggle:before {
  transform: translateX(24px);
}

.mixer-board {
  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 100%;
}

.track-row {
  background-color: var(--card-bg);
  padding: 15px;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

.track-title {
  font-weight: 600;
  color: #cbd5e1;
}

.btn-delete {
  background-color: transparent;
  border: none; /* Strip standard button boundaries for inline deletions */
  color: var(--danger);
  padding: 5px 10px;
  font-size: 0.85rem;
  flex: none;
}

.controls-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.slider-container {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.slider-label {
  font-size: 0.75rem;
  color: #94a3b8;
  display: flex;
  justify-content: space-between;
}

input[type="range"] {
  width: 100%;
  accent-color: var(--accent);
}

input[type="range"].progress-slider {
  accent-color: var(--success);
  cursor: pointer;
}

/* --- THE MOBILE FIX --- */
@media (max-width: 600px) {
  body {
    padding: 10px;
  }
  
  h1 {
    font-size: 1.4rem;
  }

  .controls-container {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  input[type="range"] {
    height: 24px;
  }

  .track-header {
    display: flex; /* Added display layout to make alignment rules target correctly */
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
    margin-bottom: 4px;
  }
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.6; }
  100% { opacity: 1; }
}
</style>
</head>
<body>

  <main>
    <h1>Multitrack Studio</h1>
    <div class="subtitle">A dynamic scratchpad for layout and recording music ideas</div>

<div id="controls-sector">
  <div class="button-group">
    <!-- Updated with dynamic text placeholder -->
    <button id="recordBtn" class="btn-record">RECORD TRACK 1 FROM MICROPHONE</button>
  </div>
  <!-- REMOVED: The old "Load from Beat Maker" or vault button group is gone completely -->
</div>
      
      <input type="file" id="audio-file-input" accept="audio/*" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">

      <div class="button-group">
        <button id="master-play-btn" class="btn-global" disabled>▶️ Play Mix</button>
        <button id="reset-btn" class="btn-global" disabled>⏮️ Restart</button>
      </div>

      <div class="toggle-container">
        <div class="toggle-label-group">
          <span>🔁</span>
          <span>Master Loop Repeat</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="loop-toggle" checked>
          <span class="slider-toggle"></span>
        </label>
      </div>

      <div class="toggle-container" style="flex-direction: column; align-items: stretch; gap: 6px;">
        <div class="slider-label">
          <span>⏱️ Mic Alignment Latency</span>
          <span id="latency-val">80ms</span>
        </div>
        <input type="range" id="latency-slider" min="0" max="250" step="5" value="80">
      </div>

      <button id="save-mix-btn" class="btn-save" disabled>💾 Save Mix to File</button>
    </div>

    <section class="mixer-board" id="mixer-board"></section>
  </main>

  <script>

    
    // ─── State ────────────────────────────────────────────────────────────────
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let isCountdownActive = false;
    let isPlayingMix = false;
    let localStream = null;
    
    let masterPlaybackStartTime = 0; 
    let progressAnimationId = null;
    let loopTimeoutId = null;
    let isScrubbing = false;

    const tracks = [];
    let audioCtx = null;


// ─── DOM refs ─────────────────────────────────────────────────────────────
    // FIX: Match exact ID case-sensitivity ('recordBtn' in HTML, not 'record-btn')
    const recordBtn       = document.getElementById('recordBtn');
    const audioFileInput  = document.getElementById('audio-file-input');
    const masterPlayBtn   = document.getElementById('master-play-btn');
    const resetBtn        = document.getElementById('reset-btn');
    const loopToggle      = document.getElementById('loop-toggle');
    const latencySlider   = document.getElementById('latency-slider');
    const latencyVal      = document.getElementById('latency-val');
    const saveMixBtn      = document.getElementById('save-mix-btn');
    const mixerBoard      = document.getElementById('mixer-board');

    // SAFEGUARD DELETED HTML ELEMENTS:
    // These buttons were removed from your HTML markup. We initialize them as null
    // so any old background listeners attached to them won't crash the script thread!
    const importBtn       = null;
    const vaultBtn        = null;

    // Attach listener safely only if the slider exists
    if (latencySlider && latencyVal) {
      latencySlider.addEventListener('input', (e) => {
        latencyVal.textContent = `${e.target.value}ms`;
      });
    }
  

window.addEventListener('message', async (event) => {
  console.log("Multitrack received:", event.data);
  
  if (event.data.action === 'ADD_CLIP_TO_TIMELINE') {
    const { audioBlob, trackName } = event.data;
    addAudioToTimeline(trackName, audioBlob);
  }
  
  if (event.data.action === 'START_AUDIO') {
    await Tone.start(); 
    Tone.Transport.bpm.value = event.data.bpm || 120;
    
    if (Tone.Transport.state !== 'started') {
      Tone.Transport.loop = false; // Prevent backing tracks from looping globally
      
      // Kicks off our Tone-linked track nodes and starts the clock
      startAllTracks(); 
      Tone.Transport.start();
    }
  }

  if (event.data.action === 'STOP_AUDIO') {
    if (Tone.Transport.state === 'started') {
      Tone.Transport.stop();
      stopAllTracks(); // Cleans up active player nodes
    }
  }
  
  if (event.data.action === 'SWITCH_APP') {
    updateUI(); 
  }
  
  if (event.data && event.data.action === 'ADD_TRACK') {
    const { audioBuffer, trackName } = event.data;
    try {
        await Tone.start();
        await createTrackNodeFromBuffer(audioBuffer, trackName);
        console.log("Success: Track successfully added to mixer.");
    } catch (err) {
        console.error('Failed to add incoming clip:', err);
    }
  }
});


async function createTrackNodeFromBuffer(arrayBuffer, customName) {
  const ctx = getAudioContext();
  
  const actualBuffer = arrayBuffer.buffer ? arrayBuffer.buffer : arrayBuffer;
  const decodedBuffer = await ctx.decodeAudioData(actualBuffer);

  const trackObject = {
    id: Date.now(),
    name: customName || `Track ${tracks.length + 1}`,
    audioBuffer: decodedBuffer,
    // ─── TONE PLAYBACK PROPERTIES ───
    tonePlayer: null,
    volumeNode: null,
    pannerNode: null,
    currentPan: 0,
    currentVolume: 1.0,
    duration: decodedBuffer.duration || 0,
    playheadOffset: 0
  };

  tracks.push(trackObject);
  console.log("Track added to state:", tracks);

// ─── ALIGN DOM REFERENCES HERE ───
  // Use mixerBoard directly instead of mixerContainer
  if (typeof mixerBoard !== 'undefined' && mixerBoard) {
      mixerBoard.innerHTML = ''; 
  }
  
  renderMixerBoard();
}
    
    // Send the request when your internal Play button is pressed
const playBtn = document.getElementById('playBtn');
if (playBtn) {
  playBtn.addEventListener('click', () => {
    window.parent.postMessage({ action: 'REQUEST_PLAY', bpm: 120 }, '*');
  });
}

    
async function addAudioToTimeline(url, trackName) {
  try {
    console.log("Loading data for:", trackName);

    // 1. Fetch the data
    const response = await fetch(url);
    
    // 2. Convert directly to ArrayBuffer (This is what decodeAudioData needs)
    const arrayBuffer = await response.arrayBuffer();
    
    console.log("ArrayBuffer ready. Size:", arrayBuffer.byteLength);

    // 3. Update your function to accept an ArrayBuffer instead of a Blob
    await createTrackNodeFromBuffer(arrayBuffer, trackName);
    
    console.log("Success: Track added to mixer.");
  } catch (err) {
    console.error('CRITICAL ERROR in addAudioToTimeline:', err);
  }
}
    
    // ─── AudioContext Bootstrap ───────────────────────────────────────────────
    function getAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    // ─── Record button ────────────────────────────────────────────────────────
    recordBtn.addEventListener('click', async () => {
      if (isCountdownActive) return;
      getAudioContext();

      if (!isRecording) {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          isCountdownActive = true;
          recordBtn.className = 'btn-countdown';
          
          let count = 3;
          recordBtn.textContent = `⏳ Recording starts in ${count}...`;

          const countdownInterval = setInterval(() => {
            count--;
            if (count > 0) {
              recordBtn.textContent = `⏳ Recording starts in ${count}...`;
            } else {
              clearInterval(countdownInterval);
              isCountdownActive = false;
              startHardwareRecording();
            }
          }, 1000);

        } catch (err) {
          console.error('Microphone access denied:', err);
          alert('Could not access microphone. Check site permissions.');
        }
      } else {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
        }
        isRecording = false;
      }
    });

    // ─── Import functionality ─────────────────────────────────────────────────
    if (importBtn && audioFileInput) {
      importBtn.addEventListener('click', (e) => {
        e.preventDefault();
        audioFileInput.click();
      });

      audioFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (!file.type.startsWith('audio/')) {
          alert('Please select a valid audio file.');
          return;
        }

        createTrackNode(file, file.name);
        audioFileInput.value = '';
      });
    }

    // ─── Shared Beat Vault Integration (IndexedDB) ───────────────────────────
    vaultBtn.addEventListener('click', () => {
      getAudioContext();
      const request = indexedDB.open("MobileStudioDB", 1);

      request.onsuccess = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("studio_vault")) {
          alert("No database found! Export a beat from your Beat Maker app first.");
          return;
        }

        const transaction = db.transaction("studio_vault", "readonly");
        const store = transaction.objectStore("studio_vault");
        const getRequest = store.get("latest_beat");

        getRequest.onsuccess = () => {
          const result = getRequest.result;
          if (result && result.audioBlob) {
            createTrackNode(result.audioBlob, result.name || "Imported Beat");
          } else {
            alert("No exported sequences discovered in the studio vault yet.");
          }
        };
      };

      request.onerror = () => {
        alert("Failed to connect to the shared studio vault database.");
      };
    });

    // ─── Recording logic ──────────────────────────────────────────────────────
    function startHardwareRecording() {
      recordedChunks = [];
      
      if (tracks.length > 0) {
        startAllTracks({ monitoringOnly: true });
      }

      const mimeType = getSupportedMimeType();
      const recorderOptions = mimeType ? { mimeType } : {};

      mediaRecorder = new MediaRecorder(localStream, recorderOptions);
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        stopAllTracks();
        let rawBlob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        
        const compensationMs = parseInt(latencySlider.value);
        if (compensationMs > 0 && tracks.length > 0) {
          rawBlob = await sliceAudioBlobLatency(rawBlob, compensationMs);
        }

        await createTrackNode(rawBlob, `Recorded Input ${tracks.length + 1}`);

        if (localStream) {
          localStream.getTracks().forEach(t => t.stop());
          localStream = null;
        }
        updateUI();
      };

      mediaRecorder.start();
      isRecording = true;
      recordBtn.textContent = '⏹️ Stop Recording';
      recordBtn.className = 'btn-recording';
    }

    function getSupportedMimeType() {
      const candidates = [
        'audio/webm;codecs=opus',
        'audio/webm',
        'audio/ogg;codecs=opus',
        'audio/mp4',
      ];
      return candidates.find(m => MediaRecorder.isTypeSupported(m)) || '';
    }

    async function sliceAudioBlobLatency(blob, msToRemove) {
      const tempCtx = getAudioContext();
      const arrayBuffer = await blob.arrayBuffer();
      const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer);
      
      const sampleRate = audioBuffer.sampleRate;
      const samplesToRemove = Math.floor((msToRemove / 1000) * sampleRate);
      
      if (samplesToRemove >= audioBuffer.length) return blob;

      const newLength = audioBuffer.length - samplesToRemove;
      const offlineCtx = new OfflineAudioContext(audioBuffer.numberOfChannels, newLength, sampleRate);
      
      const bufferSource = offlineCtx.createBufferSource();
      bufferSource.buffer = audioBuffer;
      bufferSource.connect(offlineCtx.destination);
      
      bufferSource.start(0, msToRemove / 1000);
      
      const renderedBuffer = await offlineCtx.startRendering();
      return audioBufferToWav(renderedBuffer);
    }

    // ─── Track creation ───────────────────────────────────────────────────────
async function createTrackNode(blob, customName) {
  const ctx = getAudioContext();
  
  // 1. Convert the blob to an ArrayBuffer
  const arrayBuffer = await blob.arrayBuffer();
  
  // 2. Decode the buffer (using a new name: decodedAudio)
  const decodedAudio = await ctx.decodeAudioData(arrayBuffer);

  // 3. Create the track object
  const trackObject = {
    id: Date.now(),
    name: customName || `Track ${tracks.length + 1}`,
    blob: blob, // Store the blob
    audioBuffer: decodedAudio, // Use the decoded data
    sourceNode: null,
    gainNode: null,
    panNode: null,
    currentPan: 0,
    currentVolume: 1.0,
    duration: decodedAudio.duration || 0,
    playheadOffset: 0
  };

  tracks.push(trackObject);
  
  // 4. Trigger the UI refresh
  renderMixerBoard();
}

function updateRecordButtonText() {
  const recordBtn = document.getElementById('recordBtn');
  if (recordBtn && !isRecording) {
    recordBtn.textContent = `RECORD TRACK ${tracks.length + 1} FROM MICROPHONE`;
  }
}

// Call updateRecordButtonText() inside your renderMixerBoard() 
// and after any track deletion to keep it accurate!
    // ─── Mixer UI ─────────────────────────────────────────────────────────────

function renderMixerBoard() {
  console.log("Rendering board. Tracks count:", tracks.length);
  
  if (!mixerBoard) {
    console.error("mixerBoard DOM element is missing!");
    return;
  }
  
  mixerBoard.innerHTML = '';

  tracks.forEach((track) => {
    const totalDurationText = track.duration ? track.duration.toFixed(1) + 's' : '0.0s';
    const row = document.createElement('div');
    row.className = 'track-row';
    
    // We use unique ID tags to completely avoid querySelector ambiguity
    row.innerHTML = `
      <div class="track-header">
        <span class="track-title">${track.name}</span>
        <button class="btn-delete" id="delete-btn-${track.id}">Delete</button>
      </div>
      <div class="controls-container">
        <div class="slider-container">
          <div class="slider-label">
            <span>Playback Position</span>
            <div>
              <span id="current-time-${track.id}">0.0s</span> / <span>${totalDurationText}</span>
            </div>
          </div>
          <input type="range" class="progress-slider" id="progress-${track.id}" min="0" max="${track.duration || 0}" step="0.01" value="0">
        </div>
        <div class="slider-container">
          <div class="slider-label">
            <span>Volume</span>
            <span id="vol-txt-${track.id}">${Math.round(track.currentVolume * 100)}%</span>
          </div>
          <input type="range" id="volume-${track.id}" min="0" max="1.5" step="0.05" value="${track.currentVolume}">
        </div>
        <div class="slider-container">
          <div class="slider-label">
            <span>Left</span>
            <span>Stereo Pan</span>
            <span>Right</span>
          </div>
          <input type="range" id="pan-${track.id}" min="-1" max="1" step="0.1" value="${track.currentPan}">
        </div>
      </div>
    `;
    
    // CRITICAL: Append the row to the DOM FIRST so elements are live
    mixerBoard.appendChild(row);

    // Now safely look up elements by their strict unique structural IDs
    const deleteBtn = document.getElementById(`delete-btn-${track.id}`);
    if (deleteBtn) {
      deleteBtn.onclick = () => deleteTrack(track.id);
    }

    const volumeSlider = document.getElementById(`volume-${track.id}`);
    if (volumeSlider) {
      volumeSlider.oninput = (e) => updateVolume(track.id, e.target.value);
    }

    const panSlider = document.getElementById(`pan-${track.id}`);
    if (panSlider) {
      panSlider.oninput = (e) => updatePan(track.id, e.target.value);
    }

    const progressSlider = document.getElementById(`progress-${track.id}`);
    if (progressSlider) {
      progressSlider.oninput = (e) => {
        isScrubbing = true;
        const targetTime = parseFloat(e.target.value);
        if (typeof updateAllProgressUI === 'function') updateAllProgressUI(targetTime);
      };

      progressSlider.onchange = (e) => {
        const targetTime = parseFloat(e.target.value);
        if (typeof scrubPlaybackToTimestamp === 'function') scrubPlaybackToTimestamp(targetTime);
        isScrubbing = false;
      };
    }
  });

  const recordBtn = document.getElementById('recordBtn');
  if (recordBtn && !isRecording) {
    recordBtn.textContent = `RECORD TRACK ${tracks.length + 1} FROM MICROPHONE`;
  }

  if (typeof updateUI === 'function') updateUI();
}


    function deleteTrack(id) {
      stopAllTracks();
      const index = tracks.findIndex(t => t.id === id);
      if (index !== -1) {
        tracks.splice(index, 1);
      }
      renderMixerBoard();
    }

    // ─── Playback ─────────────────────────────────────────────────────────────
    if (masterPlayBtn) {
      masterPlayBtn.addEventListener('click', () => {
        getAudioContext();
        if (isPlayingMix) {
          stopAllTracks();
        } else {
          startAllTracks();
        }
      });
    }

    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        getAudioContext();
        stopAllTracks();
        tracks.forEach(t => t.playheadOffset = 0);
        resetAllProgressUI();
      });
    }


function startAllTracks(options = {}) {
  if (!tracks || tracks.length === 0) return;

  let baseOffset = tracks[0].playheadOffset;
  const maxDuration = Math.max(...tracks.map(t => t.duration));
  
  if (baseOffset >= maxDuration) {
    baseOffset = 0;
    tracks.forEach(t => t.playheadOffset = 0);
  }

  tracks.forEach(track => {
    // 1. Clean up old Tone players for this track if they exist
    if (track.tonePlayer) {
      try { track.tonePlayer.dispose(); } catch(e) {}
    }

    // 2. Create a Tone Player using your stored audioBuffer
    track.tonePlayer = new Tone.Player(track.audioBuffer);
    
    // ─── STRICT LINEAR PLAYBACK (NO LOOPING) ───
    track.tonePlayer.loop = false; 

    // 3. Re-create your Volume and Pan controls using Tone.js modules
    // Note: Tone.Volume takes Decibels (dB). Tone.gainToDb converts 1.0 -> 0dB cleanly.
    track.volumeNode = new Tone.Volume(Tone.gainToDb(track.currentVolume));
    track.pannerNode = new Tone.Panner(track.currentPan);

    // 4. Chain them together: Player -> Volume -> Panner -> Master Output
    track.tonePlayer.chain(track.volumeNode, track.pannerNode, Tone.Destination);

    // 5. Sync the player directly to Tone.Transport's clock timeline
    if (track.playheadOffset < track.duration) {
      // Starts automatically at 0 on the timeline, adjusted by your offset
      track.tonePlayer.sync().start(0, track.playheadOffset);
    }
  });

  if (!options.monitoringOnly) {
    isPlayingMix = true;
    masterPlayBtn.textContent = '⏸️ Pause Mix';
    progressAnimationId = requestAnimationFrame(updatePlaybackProgressUI);
    
    // ─── NO MORE TIMEOUT LOOPS ───
    // Deleting scheduleMasterLoopTimeout() prevents tracks from repeating automatically!
  }
}

function stopAllTracks() {
  cancelAnimationFrame(progressAnimationId);
  // clearTimeout(loopTimeoutId); // No longer needed as Tone.Transport handles timeline limits

  if (isPlayingMix) {
    // ─── TONE.JS POSITION CAPTURE ───
    // Tone tracks time cleanly in seconds on its timeline. 
    // We capture it here to update the playhead before resetting.
    const currentTimelinePosition = Tone.Transport.seconds;
    
    tracks.forEach(track => {
      // Keep track of where the song paused so we can resume smoothly
      track.playheadOffset = currentTimelinePosition;

      // Clean up the active Tone.Player instance
      if (track.tonePlayer) {
        try { 
          track.tonePlayer.stop(); 
          track.tonePlayer.dispose(); // Crucial to prevent duplicate synced audio clips
        } catch(e) {
          console.error("Error stopping track player:", e);
        }
        track.tonePlayer = null;
      }
    });
  } else {
    tracks.forEach(track => {
      if (track.tonePlayer) {
        try { 
          track.tonePlayer.stop(); 
          track.tonePlayer.dispose();
        } catch(e) {}
        track.tonePlayer = null;
      }
    });
  }

  isPlayingMix = false;
  masterPlayBtn.textContent = '▶️ Play Mix';
}

    function scrubPlaybackToTimestamp(targetTime) {
      const originallyPlaying = isPlayingMix;
      stopAllTracks();
      tracks.forEach(track => {
        track.playheadOffset = targetTime;
      });
      updateAllProgressUI(targetTime);
      if (originallyPlaying) {
        startAllTracks();
      }
    }

    function resetAllProgressUI() {
      updateAllProgressUI(0);
    }

    function updateAllProgressUI(timeInSeconds) {
      tracks.forEach(track => {
        const currentPos = Math.min(timeInSeconds, track.duration);
        const progSlider  = document.getElementById(`progress-${track.id}`);
        const currentText = document.getElementById(`current-time-${track.id}`);
        if (progSlider)  progSlider.value       = currentPos;
        if (currentText) currentText.textContent = currentPos.toFixed(1) + 's';
      });
    }

    function updatePlaybackProgressUI() {
      if (!isPlayingMix || !audioCtx || isScrubbing) return;

      const elapsed = audioCtx.currentTime - masterPlaybackStartTime;
      updateAllProgressUI(elapsed);

      progressAnimationId = requestAnimationFrame(updatePlaybackProgressUI);
    }

    function scheduleMasterLoopTimeout() {
      const maxDuration = Math.max(...tracks.map(t => t.duration));
      const elapsed = audioCtx.currentTime - masterPlaybackStartTime;
      const timeRemaining = maxDuration - elapsed;

      clearTimeout(loopTimeoutId);
      
      loopTimeoutId = setTimeout(() => {
        if (!isPlayingMix) return;

        stopAllTracks();
        tracks.forEach(t => t.playheadOffset = 0);
        resetAllProgressUI();

        if (loopToggle.checked) {
          startAllTracks();
        }
      }, Math.max(0, timeRemaining * 1000));
    }

    // ─── UI State ─────────────────────────────────────────────────────────────
    function updateUI() {
      const noTracks = tracks.length === 0;
      masterPlayBtn.disabled = noTracks;
      resetBtn.disabled      = noTracks;
      saveMixBtn.disabled    = noTracks;

      if (isRecording || isCountdownActive) return;

      recordBtn.disabled    = false;
      recordBtn.textContent = `🔴 Record Track ${tracks.length + 1}`;
      recordBtn.className   = 'btn-record';
    }

    // ─── Export ───────────────────────────────────────────────────────────────
    saveMixBtn.addEventListener('click', async () => {
      if (!tracks || tracks.length === 0) return;
      saveMixBtn.disabled    = true;
      saveMixBtn.textContent = 'Rendering Mix...';

      try {
        const maxDuration = Math.max(...tracks.map(t => t.duration));
        const sampleRate  = tracks[0].audioBuffer.sampleRate;
        const offlineCtx  = new OfflineAudioContext(2, Math.ceil(sampleRate * maxDuration), sampleRate);

        tracks.forEach((track) => {
          const bufferSource = offlineCtx.createBufferSource();
          bufferSource.buffer = track.audioBuffer;

          const offlineGain   = offlineCtx.createGain();
          offlineGain.gain.setValueAtTime(track.currentVolume, 0);

          const offlinePanner = offlineCtx.createStereoPanner();
          offlinePanner.pan.setValueAtTime(track.currentPan, 0);

          bufferSource.connect(offlineGain);
          offlineGain.connect(offlinePanner);
          offlinePanner.connect(offlineCtx.destination);
          bufferSource.start(0);
        });

        const renderedBuffer = await offlineCtx.startRendering();
        const wavBlob        = audioBufferToWav(renderedBuffer);
        const downloadUrl    = URL.createObjectURL(wavBlob);

        const anchor = document.createElement('a');
        anchor.href     = downloadUrl;
        anchor.download = `multitrack-mix-${Date.now()}.wav`;
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        URL.revokeObjectURL(downloadUrl);

      } catch (err) {
        console.error('Export failure:', err);
        alert('Failed to export the audio mix.');
      } finally {
        saveMixBtn.disabled    = false;
        saveMixBtn.textContent = '💾 Save Mix to File';
      }
    });

    // ─── WAV Encoder ──────────────────────────────────────────────────────────
    function audioBufferToWav(buffer) {
      const numOfChan = buffer.numberOfChannels;
      const sampleRate = buffer.sampleRate;
      const bitDepth   = 16;
      let result;

      if (numOfChan === 2) {
        result = interleave(buffer.getChannelData(0), buffer.getChannelData(1));
      } else {
        result = buffer.getChannelData(0);
      }

      const bufferArr = new ArrayBuffer(44 + result.length * 2);
      const view      = new DataView(bufferArr);

      writeString(view, 0,  'RIFF');
      view.setUint32(4,  36 + result.length * 2, true);
      writeString(view, 8,  'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1,  true);
      view.setUint16(22, numOfChan,  true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * numOfChan * (bitDepth / 8), true);
      view.setUint16(32, numOfChan * (bitDepth / 8), true);
      view.setUint16(34, bitDepth,   true);
      writeString(view, 36, 'data');
      view.setUint32(40, result.length * 2, true);

      let offset = 44;
      for (let i = 0; i < result.length; i++, offset += 2) {
        const s = Math.max(-1, Math.min(1, result[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      }

      return new Blob([view], { type: 'audio/wav' });
    }

    function interleave(inputL, inputR) {
      const length = inputL.length + inputR.length;
      const result = new Float32Array(length);
      let index = 0, inputIndex = 0;
      while (index < length) {
        result[index++] = inputL[inputIndex];
        result[index++] = inputR[inputIndex];
        inputIndex++;
      }
      return result;
    }

    function writeString(view, offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }

    updateUI();
    


// 3. Play Request Listener
document.addEventListener('DOMContentLoaded', () => {
  const playBtn = document.getElementById('playBtn');
  if (playBtn) {
    playBtn.addEventListener('click', () => {
      window.parent.postMessage({ action: 'REQUEST_PLAY', bpm: 120 }, '*');
    });
  }
});
    
  </script>
</body>
