<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Multitrack Mixer</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --panel: #12121c;
      --border: #26263b;
      --text: #e2e2e9;
      --accent: #00e5ff;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body { background-color: var(--bg); color: var(--text); font-family: sans-serif; padding: 10px; }
    main { width: 100%; max-width: 600px; margin: 0 auto; }
    .control-panel { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-record { background-color: var(--accent); color: #000; }
    .track-row { background-color: var(--panel); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; }
    .slider-group { margin-top: 10px; }
    input[type="range"] { width: 100%; margin-top: 5px; }
    .label-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>
<body>
  <main>
    <h1>Studio</h1>
    <section class="control-panel">
      <button id="record-btn" class="btn-record">🔴 Record New Track</button>
    </section>
    <div id="mixer-board" class="mixer-board"></div>
  </main>

  <script>
    const tracks = [];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    window.addEventListener('message', async (event) => {
        if (event.data.action === 'ADD_TRACK') {
            let { audioBuffer, trackName } = event.data;
            try {
                if (!(audioBuffer instanceof ArrayBuffer)) audioBuffer = new Uint8Array(audioBuffer).buffer;
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                const decodedBuffer = await audioCtx.decodeAudioData(audioBuffer);
                createTrackNode(decodedBuffer, trackName);
            } catch (err) { console.error('Load error:', err); }
        }
    });

    function createTrackNode(buffer, name) {
      const track = {
        id: Date.now(),
        name: name || `Track ${tracks.length + 1}`,
        buffer: buffer,
        volume: 1.0,
        pan: 0
      };
      tracks.push(track);
      renderMixerBoard();
    }

    function renderMixerBoard() {
      const board = document.getElementById('mixer-board');
      board.innerHTML = '';
      tracks.forEach(t => {
        const row = document.createElement('div');
        row.className = 'track-row';
        row.innerHTML = `
          <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <strong>${t.name}</strong>
            <button onclick="deleteTrack(${t.id})" style="background:none; color:var(--danger)">Delete</button>
          </div>
          <div class="slider-group">
            <div class="label-row"><span>Volume</span><span>${Math.round(t.volume * 100)}%</span></div>
            <input type="range" min="0" max="1" step="0.1" value="${t.volume}" oninput="updateVol(${t.id}, this.value)">
          </div>
          <div class="slider-group">
            <div class="label-row"><span>Left</span><span>Pan</span><span>Right</span></div>
            <input type="range" min="-1" max="1" step="0.1" value="${t.pan}" oninput="updatePan(${t.id}, this.value)">
          </div>
        `;
        board.appendChild(row);
      });
    }

    function updateVol(id, val) {
      const t = tracks.find(t => t.id == id);
      if(t) { t.volume = parseFloat(val); renderMixerBoard(); }
    }

    function updatePan(id, val) {
      const t = tracks.find(t => t.id == id);
      if(t) t.pan = parseFloat(val);
    }

    function deleteTrack(id) {
      const idx = tracks.findIndex(t => t.id == id);
      if(idx > -1) { tracks.splice(idx, 1); renderMixerBoard(); }
    }
  </script>
</body>
</html>
