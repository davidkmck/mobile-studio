<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Beat Maker</title>
  <link rel="apple-touch-icon" href="./beat-maker.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<style>
  :root {
    --bg: #0a0a0f;
    --panel: #12121c;
    --border: #26263b;
    --text: #e2e2e9;
    --accent: #00e5ff;
    --kick: #ff3366;
    --snare: #ffee55;
    --hihat: #00e5ff;
    --clap: #9d4edd;
    --bass: #77ff77;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    padding: 20px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 950px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  /* Force the grid to be visible and have layout */
  #grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    min-height: 200px; /* Ensures space exists even before JS renders */
  }

  .beat-row {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 15px;
    align-items: center;
    width: 100%;
  }

  .track-label { font-weight: bold; font-size: 11px; }

  .steps {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 6px;
    width: 100%;
  }

  .step {
    height: 38px;
    background-color: var(--border);
    border-radius: 3px;
    cursor: pointer;
  }

  .step.active {
    background-color: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
  }

  button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 4px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>BEAT_MAKER//_</h1>
    <div class="controls">
      
      <div class="bpm-container">
        <label>BPM</label>
        <input type="number" id="bpm" value="120" min="60" max="200">
      </div>
      <select id="factorySelect">
  <option value="">-- FACTORY BANK --</option>
  <option value="techno">Techno</option>
  <option value="house">House</option>
</select>
      <button id="playBtn">▶ PLAY</button>
      <button id="clearBtn">CLEAR</button>
      <button id="toggleEditBtn">🎛️ SHOW EDIT CONTROLS</button>
      <button id="saveBtn">💾 SAVE BEAT</button>
      <button id="recordBtn">RECORD WAV</button>
    </div>
  </header>

  <div class="sequencer-grid">
    <div id="grid"></div>
  </div>

  <div class="synth-edit-panel" id="synthEditor">
    <div id="globalEditorControls"></div>
  </div>
</div>

<script>
    const TRACKS = [{ id: 'kick', label: 'KICK', color: 'kick' }, { id: 'snare', label: 'SNARE', color: 'snare' }, { id: 'hihat', label: 'HI-HAT', color: 'hihat' }, { id: 'clap', label: 'CLAP', color: 'clap' }, { id: 'bass', label: 'BASS', color: 'bass' }];
    const STEPS = 16;
    let bpm = 120;
    let grid = TRACKS.map(() => Array(STEPS).fill(false));
    let isPlaying = false, isRecording = false, recorder = null;

    function buildGridUI() {
      const container = document.getElementById('grid');
      container.innerHTML = '';
      
      TRACKS.forEach((track, ti) => {
        const row = document.createElement('div');
        row.className = 'beat-row';
        const label = document.createElement('div');
        label.className = 'track-label';
        label.textContent = track.label;
        row.appendChild(label);
        
        const stepsContainer = document.createElement('div');
        stepsContainer.className = 'steps';
        for (let si = 0; si < STEPS; si++) {
          const step = document.createElement('div');
          step.className = 'step';
          if (grid[ti][si]) step.classList.add('active');
          step.onclick = () => {
            grid[ti][si] = !grid[ti][si];
            step.classList.toggle('active');
          };
          stepsContainer.appendChild(step);
        }
        row.appendChild(stepsContainer);
        container.appendChild(row);
      });
    }

    function triggerFactorySequence(selection) {
      const presets = {
        techno: [
          [true, false, false, false, true, false, false, false, true, false, false, false, true, false, false, false],
          [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, false],
          [false, false, true, false, false, false, true, false, false, false, true, false, false, false, true, true],
          [false, false, false, false, false, false, false, false, false, false, false, false, true, false, false, false],
          [true, true, false, true, false, true, false, false, true, false, true, false, false, true, false, false]
        ],
        house: [
          [true, false, false, false, true, false, false, false, true, false, false, false, true, false, false, false],
          [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false],
          [false, false, true, false, false, false, true, false, false, false, true, false, false, false, true, false],
          [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, false],
          [false, false, true, false, false, false, false, true, false, true, false, false, false, false, true, false]
        ]
      };
      
      if (presets[selection]) {
        grid = presets[selection];
        buildGridUI();
      }
    }

    async function recordWav() {
      const btn = document.getElementById('recordBtn');
      if (!isRecording) {
        if (!recorder) {
            recorder = new Tone.Recorder();
            Tone.Destination.connect(recorder);
        }
        recorder.start();
        isRecording = true;
        btn.textContent = 'STOP RECORDING';
        btn.classList.add('active');
      } else {
        const recording = await recorder.stop();
        window.parent.postMessage({ action: 'EXPORT_AUDIO_TO_TRACKS', audioBlob: recording, trackName: 'Beat_1' }, '*');
        window.parent.postMessage({ action: 'SWITCH_APP', app: 'multitrack' }, '*');
        isRecording = false;
        btn.textContent = 'RECORD WAV';
        btn.classList.remove('active');
      }
    }

    // Initialize UI and Listeners
    document.getElementById('recordBtn').addEventListener('click', recordWav);
    document.getElementById('factorySelect').addEventListener('change', (e) => triggerFactorySequence(e.target.value));
    
    buildGridUI(); // Call this immediately on load


</script>
</body>
</html>
