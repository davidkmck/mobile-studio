
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Beat Maker</title>
  <link rel="apple-touch-icon" href="./beat-maker.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<style>
  :root {
    --bg: #0a0a0f;
    --panel: #12121c;
    --border: #26263b;
    --text: #e2e2e9;
    --accent: #00e5ff;
    --kick: #ff3366;
    --snare: #ffee55;
    --hihat: #00e5ff;
    --clap: #9d4edd;
    --bass: #77ff77;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    padding: 20px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 950px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  #grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    min-height: 200px;
  }

  .beat-row {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 15px;
    align-items: center;
    width: 100%;
  }

  .track-label { font-weight: bold; font-size: 11px; }

  .steps {
    display: grid;
    grid-template-columns: repeat(16, 1fr);
    gap: 6px;
    width: 100%;
  }

  .step {
    height: 38px;
    background-color: var(--border);
    border-radius: 3px;
    cursor: pointer;
    transition: transform 0.05s ease;
  }

  .step.active {
    background-color: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  .step.playing {
    outline: 2px solid #fff;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 4px;
    cursor: pointer;
  }

  button:hover {
    border-color: var(--accent);
  }

  button.active {
    background: var(--accent);
    color: #000;
  }

  select, input[type="number"] {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 9px;
    border-radius: 4px;
  }

  .bpm-container {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }

  .bpm-container input {
    width: 60px;
  }

  .synth-edit-panel {
    display: none;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .synth-edit-panel.visible {
    display: block;
  }

  .editor-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 12px;
  }

  .editor-row label {
    width: 80px;
  }

  .editor-row input[type="range"] {
    flex: 1;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>BEAT_MAKER//_</h1>
    <div class="controls">

      <div class="bpm-container">
        <label>BPM</label>
        <input type="number" id="bpm" value="120" min="60" max="200">
      </div>
      <select id="factorySelect">
        <option value="">-- FACTORY BANK --</option>
        <option value="techno">Techno</option>
        <option value="house">House</option>
        <option value="hiphop">Hiphop</option>
        <option value="synthwave">Synthwave</option>
        <option value="chill">Chill</option>
      </select>
      <select id="customSelect">
        <option value="">-- MY BEATS --</option>
      </select>
      <button id="playBtn">▶ PLAY</button>
      <button id="clearBtn">CLEAR</button>
      <button id="toggleEditBtn">🎛️ SHOW EDIT CONTROLS</button>
      <button id="saveBtn">💾 SAVE BEAT</button>
      <button id="recordBtn">RECORD WAV</button>
    </div>
  </header>

  <div class="sequencer-grid">
    <div id="grid"></div>
  </div>

  <div class="synth-edit-panel" id="synthEditor">
    <div id="globalEditorControls"></div>
  </div>
</div>

<script>
    const TRACKS = [{ id: 'kick', label: 'KICK', color: 'kick' }, { id: 'snare', label: 'SNARE', color: 'snare' }, { id: 'hihat', label: 'HI-HAT', color: 'hihat' }, { id: 'clap', label: 'CLAP', color: 'clap' }, { id: 'bass', label: 'BASS', color: 'bass' }];
    const STEPS = 16;
    let bpm = 120;
    let grid = TRACKS.map(() => Array(STEPS).fill(false));
    let isPlaying = false, isRecording = false, recorder = null;
    let sequence = null;
    let currentStep = -1;

    // ---- Sound engine ----
    const volumes = { kick: -6, snare: -6, hihat: -10, clap: -8, bass: -6 };

    const synths = {
      kick: new Tone.MembraneSynth({
        pitchDecay: 0.05, octaves: 6,
        envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 0.4 }
      }).toDestination(),
      snare: new Tone.NoiseSynth({
        noise: { type: 'white' },
        envelope: { attack: 0.001, decay: 0.2, sustain: 0 }
      }).toDestination(),
      hihat: new Tone.MetalSynth({
        envelope: { attack: 0.001, decay: 0.1, release: 0.01 },
        harmonicity: 5.1, modulationIndex: 32, resonance: 4000, octaves: 1.5
      }).toDestination(),
      clap: new Tone.NoiseSynth({
        noise: { type: 'pink' },
        envelope: { attack: 0.001, decay: 0.15, sustain: 0 }
      }).toDestination(),
      bass: new Tone.MonoSynth({
        oscillator: { type: 'sawtooth' },
        envelope: { attack: 0.01, decay: 0.3, sustain: 0.2, release: 0.3 },
        filterEnvelope: { attack: 0.01, decay: 0.2, sustain: 0.3, baseFrequency: 200, octaves: 3 }
      }).toDestination()
    };

    Object.keys(volumes).forEach(id => { synths[id].volume.value = volumes[id]; });

    function triggerTrack(id, time) {
      switch (id) {
        case 'kick': synths.kick.triggerAttackRelease('C1', '8n', time); break;
        case 'snare': synths.snare.triggerAttackRelease('8n', time); break;
        case 'hihat': synths.hihat.triggerAttackRelease('16n', time); break;
        case 'clap': synths.clap.triggerAttackRelease('16n', time); break;
        case 'bass': synths.bass.triggerAttackRelease('C2', '8n', time); break;
      }
    }

    // ---- Grid UI ----
    function buildGridUI() {
      const container = document.getElementById('grid');
      container.innerHTML = '';

      TRACKS.forEach((track, ti) => {
        const row = document.createElement('div');
        row.className = 'beat-row';
        const label = document.createElement('div');
        label.className = 'track-label';
        label.textContent = track.label;
        row.appendChild(label);

        const stepsContainer = document.createElement('div');
        stepsContainer.className = 'steps';
        stepsContainer.dataset.track = ti;
        for (let si = 0; si < STEPS; si++) {
          const step = document.createElement('div');
          step.className = 'step';
          step.dataset.step = si;
          if (grid[ti][si]) step.classList.add('active');
          step.onclick = () => {
            grid[ti][si] = !grid[ti][si];
            step.classList.toggle('active');
            saveSession();
          };
          stepsContainer.appendChild(step);
        }
        row.appendChild(stepsContainer);
        container.appendChild(row);
      });
    }

    function highlightStep(stepIndex) {
      document.querySelectorAll('.step.playing').forEach(el => el.classList.remove('playing'));
      document.querySelectorAll('.steps').forEach(stepsEl => {
        const el = stepsEl.querySelector(`.step[data-step="${stepIndex}"]`);
        if (el) el.classList.add('playing');
      });
    }

    // ---- Playback ----
    async function startStopSequencer() {
      const btn = document.getElementById('playBtn');
      await Tone.start();

      if (isPlaying) {
        Tone.Transport.stop();
        if (sequence) { sequence.dispose(); sequence = null; }
        Tone.Transport.cancel();
        isPlaying = false;
        btn.textContent = '▶ PLAY';
        document.querySelectorAll('.step.playing').forEach(el => el.classList.remove('playing'));
        currentStep = -1;
        return;
      }

      bpm = parseInt(document.getElementById('bpm').value, 10) || 120;
      Tone.Transport.bpm.value = bpm;

      currentStep = -1;
      sequence = new Tone.Sequence((time, stepIndex) => {
        TRACKS.forEach((track, ti) => {
          if (grid[ti][stepIndex]) {
            triggerTrack(track.id, time);
          }
        });
        Tone.Draw.schedule(() => highlightStep(stepIndex), time);
      }, [...Array(STEPS).keys()], '16n');

      sequence.start(0);
      Tone.Transport.start();
      isPlaying = true;
      btn.textContent = '■ STOP';
    }

    // ---- Edit panel ----
    function buildEditorControls() {
      const wrap = document.getElementById('globalEditorControls');
      wrap.innerHTML = '';
      TRACKS.forEach(track => {
        const row = document.createElement('div');
        row.className = 'editor-row';

        const label = document.createElement('label');
        label.textContent = track.label;
        row.appendChild(label);

        const slider = document.createElement('input');
        slider.type = 'range';
        slider.min = -40;
        slider.max = 0;
        slider.value = synths[track.id].volume.value;
        slider.addEventListener('input', () => {
          synths[track.id].volume.value = parseFloat(slider.value);
        });
        row.appendChild(slider);

        wrap.appendChild(row);
      });
    }

    function toggleEditDashboard() {
      const panel = document.getElementById('synthEditor');
      const btn = document.getElementById('toggleEditBtn');
      const willShow = !panel.classList.contains('visible');
      panel.classList.toggle('visible');
      btn.textContent = willShow ? '🎛️ HIDE EDIT CONTROLS' : '🎛️ SHOW EDIT CONTROLS';
      if (willShow && !wrap_filled()) buildEditorControls();
    }

    function wrap_filled() {
      return document.getElementById('globalEditorControls').children.length > 0;
    }

    // ---- Session persistence (remembers last beat across sessions) ----
    const SESSION_KEY = 'beatmaker_last_session';

    function saveSession() {
      try {
        localStorage.setItem(SESSION_KEY, JSON.stringify({
          bpm,
          grid,
          factorySelection: document.getElementById('factorySelect').value,
          customSelection: document.getElementById('customSelect').value
        }));
      } catch (e) { /* ignore storage errors */ }
    }

    function restoreSession() {
      try {
        const saved = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
        if (!saved) return false;
        bpm = saved.bpm || 120;
        document.getElementById('bpm').value = bpm;
        grid = saved.grid && saved.grid.length === TRACKS.length
          ? saved.grid.map(row => [...row])
          : TRACKS.map(() => Array(STEPS).fill(false));
        if (saved.factorySelection) document.getElementById('factorySelect').value = saved.factorySelection;
        if (saved.customSelection) document.getElementById('customSelect').value = saved.customSelection;
        return true;
      } catch (e) {
        return false;
      }
    }

    // ---- Custom presets ----
    function getCustomPresets() {
      try {
        return JSON.parse(localStorage.getItem('beatmaker_custom_presets') || '{}');
      } catch (e) {
        return {};
      }
    }

    function refreshCustomSelectOptions() {
      const select = document.getElementById('customSelect');
      const presets = getCustomPresets();
      select.innerHTML = '<option value="">-- MY BEATS --</option>';
      Object.keys(presets).forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
    }

    function saveCustomPreset() {
      const name = window.prompt('Name this beat:', 'My Beat');
      if (!name) return;
      const presets = getCustomPresets();
      presets[name] = { bpm: parseInt(document.getElementById('bpm').value, 10) || bpm, grid };
      localStorage.setItem('beatmaker_custom_presets', JSON.stringify(presets));
      refreshCustomSelectOptions();
      document.getElementById('customSelect').value = name;
      localStorage.setItem('last_custom_selection', name);
      localStorage.removeItem('last_factory_selection');
      document.getElementById('factorySelect').value = '';
      saveSession();
    }

    function loadCustomPreset(name) {
      const presets = getCustomPresets();
      const preset = presets[name];
      if (!preset) return;
      document.getElementById('bpm').value = preset.bpm;
      bpm = preset.bpm;
      grid = preset.grid.map(row => [...row]);
      buildGridUI();
    }

    // ---- Factory presets ----
    function triggerFactorySequence(selection) {
      const presets = {
        techno: { bpm: 126, grid: [[true, false, false, false, true, false, false, false, true, false, false, false, true, false, false, false], [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, false], [false, false, true, false, false, false, true, false, false, false, true, false, false, false, true, true], [false, false, false, false, false, false, false, false, false, false, false, false, true, false, false, false], [true, true, false, true, false, true, false, false, true, false, true, false, false, true, false, false]] },
        house: { bpm: 120, grid: [[true, false, false, false, true, false, false, false, true, false, false, false, true, false, false, false], [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false], [false, false, true, false, false, false, true, false, false, false, true, false, false, false, true, false], [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, false], [false, false, true, false, false, false, false, true, false, true, false, false, false, false, true, false]] },
        hiphop: { bpm: 90, grid: [[true, false, false, false, false, false, false, true, false, true, true, false, false, false, false, false], [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, true], [true, false, true, false, true, false, true, true, true, false, true, false, true, false, true, false], [false, false, false, false, false, false, false, false, false, false, false, false, true, false, false, false], [true, false, false, false, false, false, false, false, false, true, false, false, false, false, false, false]] },
        synthwave: { bpm: 115, grid: [[true, false, false, false, false, false, false, false, true, false, false, false, false, false, false, false], [false, false, false, false, true, false, false, false, false, false, false, false, true, false, false, false], [true, true, true, true, true, true, true, true, true, true, true, true, true, true, true, true], [false, false, false, false, false, false, false, false, false, false, false, false, false, false, false, false], [true, false, true, false, true, false, true, false, true, false, true, false, true, false, true, false]] },
        chill: { bpm: 95, grid: [[true, false, false, false, false, false, true, false, false, true, false, false, false, false, false, false], [false, false, false, false, false, false, false, false, false, false, false, false, true, false, false, false], [true, true, false, true, true, false, true, false, true, true, false, true, true, false, true, false], [false, false, false, false, true, false, false, false, false, false, false, false, false, false, true, false], [true, false, false, false, false, false, false, false, true, false, false, false, false, false, false, false]] }
      };

      if (presets[selection]) {
        document.getElementById('bpm').value = presets[selection].bpm;
        bpm = presets[selection].bpm;
        grid = presets[selection].grid.map(row => [...row]);
        buildGridUI();
      }
    }

    // ---- WAV recording ----
    async function recordWav() {
      const btn = document.getElementById('recordBtn');
      await Tone.start();
      if (!isRecording) {
        if (!recorder) {
          recorder = new Tone.Recorder();
          Tone.Destination.connect(recorder);
        }
        recorder.start();
        isRecording = true;
        btn.textContent = 'STOP RECORDING';
        btn.classList.add('active');
      } else {
        const recording = await recorder.stop();

        // Stop playback along with the recording
        if (isPlaying) {
          Tone.Transport.stop();
          if (sequence) { sequence.dispose(); sequence = null; }
          Tone.Transport.cancel();
          isPlaying = false;
          document.getElementById('playBtn').textContent = '▶ PLAY';
          document.querySelectorAll('.step.playing').forEach(el => el.classList.remove('playing'));
          currentStep = -1;
        }

        window.parent.postMessage({
          action: 'EXPORT_AUDIO_TO_TRACKS',
          audioBlob: recording,
          trackName: 'Beat_1',
          mimeType: recording.type || 'audio/wav'
        }, '*');
        window.parent.postMessage({ action: 'SWITCH_APP', app: 'tracks' }, '*');

        isRecording = false;
        btn.textContent = 'RECORD WAV';
        btn.classList.remove('active');
      }
    }

    // ---- Init: listeners ----
    document.getElementById('playBtn').addEventListener('click', startStopSequencer);
    document.getElementById('toggleEditBtn').addEventListener('click', toggleEditDashboard);
    document.getElementById('saveBtn').addEventListener('click', saveCustomPreset);
    document.getElementById('recordBtn').addEventListener('click', recordWav);

    document.getElementById('bpm').addEventListener('change', (e) => {
      bpm = parseInt(e.target.value, 10) || 120;
      if (isPlaying) Tone.Transport.bpm.value = bpm;
      saveSession();
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      grid = TRACKS.map(() => Array(STEPS).fill(false));
      document.getElementById('factorySelect').value = "";
      localStorage.removeItem('last_factory_selection');
      const customSelect = document.getElementById('customSelect');
      if (customSelect) { customSelect.value = ""; localStorage.removeItem('last_custom_selection'); }
      buildGridUI();
      saveSession();
    });

    document.getElementById('factorySelect').addEventListener('change', (e) => {
      const selection = e.target.value;
      localStorage.setItem('last_factory_selection', selection);
      localStorage.removeItem('last_custom_selection');
      const userSelect = document.getElementById('customSelect');
      if (userSelect) userSelect.value = "";
      triggerFactorySequence(selection);
      saveSession();
    });

    document.getElementById('customSelect').addEventListener('change', (e) => {
      const selection = e.target.value;
      if (!selection) return;
      localStorage.setItem('last_custom_selection', selection);
      localStorage.removeItem('last_factory_selection');
      document.getElementById('factorySelect').value = '';
      loadCustomPreset(selection);
      saveSession();
    });

    // ---- Boot ----
    refreshCustomSelectOptions();
    restoreSession();
    buildGridUI();
</script>
</body>
</html>
