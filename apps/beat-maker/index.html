<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beat</title>
  <link rel="apple-touch-icon" href="./beat-maker.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">
      <h1>Beat</h1>
    <div class="subtitle">Create and sequence custom rhythms</div>
  <header>
    <div class="controls">
      <button id="playBtn">▶ Play</button>
      <button id="clearBtn">Clear</button>
      <button id="recordBtn">🔴 Record</button>
    </div>
  </header>

  <div class="sequencer-grid">
    <div id="grid"></div>
  </div>

  <div class="secondary-controls">
    <div class="bpm-container">
      <label>BPM</label>
      <input type="number" id="bpm" value="120" min="60" max="200">
    </div>
    <select id="factorySelect">
      <option value="">-- Factory Bank --</option>
      <option value="techno">Techno</option>
      <option value="house">House</option>
      <option value="hiphop">Hiphop</option>
      <option value="synthwave">Synthwave</option>
      <option value="chill">Chill</option>
    </select>
    <select id="customSelect">
      <option value="">-- My Beats --</option>
    </select>
    <button id="saveBtn">💾 Save Beat</button>
    <button id="toggleEditBtn">🎛️ Show Edit Controls</button>
  </div>

  <div class="synth-edit-panel" id="synthEditor">
    <div id="globalEditorControls"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
