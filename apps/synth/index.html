<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Synth</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <h1>Synth</h1>
    <div class="subtitle">Play chords and design retro electronic tones</div>
    
    <header>
      <div class="controls">
        <button id="playBtn">▶ Play</button>
        <button id="recordBtn">🔴 Record</button>
      </div>
    </header>

    <div class="keyboard-wrap">
      <div class="keyboard" id="keyboard"></div>
    </div>
      
    <div class="secondary-controls">
  <!-- 🎹 Authentic Sampled Instruments -->
  <label for="instrumentSelect">Instrument:</label>
  <select id="instrumentSelect">
    <option value="synth">🎛️ Custom Synth Engine</option>
    <option value="piano">🎹 Grand Piano</option>
    <option value="guitar">🎸 Acoustic Guitar</option>
    <option value="bass">🎸 Electric Bass</option>
    <option value="organ">📻 Hammond Organ</option>
  </select>

  <!-- 🎛️ Synth Waveforms (Only active when "Custom Synth Engine" is chosen) -->
  <label for="waveSelect">Synth Wave:</label>
  <select id="waveSelect">
    <option value="sine">Sine (Pure)</option>
    <option value="sawtooth">Sawtooth (Retro)</option>
    <option value="square">Square (Chiptune)</option>
    <option value="triangle">Triangle (Soft)</option>
  </select>
  
  <button id="octaveDownBtn">Oct −</button>
  <div class="octave-display" id="octaveDisplay">Octave 4</div>
  <button id="octaveUpBtn">Oct +</button>
  <button id="toggleEditBtn">🎛️ Show Edit Controls</button>
</div>

    <!-- The Editor Panel where Echo, Reverb, Chorus, and ADSR sliders dynamically generate -->
    <div class="synth-edit-panel" id="synthEditor">
      <div id="globalEditorControls"></div>
    </div>
  </main>

  <script src="script.js"></script>

</body>
</html>
