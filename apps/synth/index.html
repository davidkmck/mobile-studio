
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Synth Engine</title>
  <style>
    :root {
  --bg: #0a0a0f;           /* The main backdrop color */
  --panel: #12121c;         /* Card/Panel background */
  --border: #26263b;        /* Border color for inputs/panels */
  --text: #e2e2e9;          /* Primary text color */
  --text-dim: #6c6c84;      /* Secondary/disabled text */
  --accent: #00e5ff;        /* Primary accent (cyan) */
  --accent-alt: #9d4edd;    /* Secondary accent (purple) */
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace; /* Or your preferred font */
  padding: 20px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Standardized button look */
button {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 15px;
  border-radius: 4px;
  cursor: pointer;
}

    .container {
  width: 100%;
  max-width: 950px;
  margin: 0 auto;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 15px;
  flex-grow: 1; /* This helps push the layout to fit the screen */
}

  </style>
</head>
<body>
  <div>🎹 SYNTH ENGINE READY</div>
  
  <script>
    // Tell the parent studio we are alive!
    window.parent.postMessage({ action: 'SYNTH_READY' }, '*');
  </script>
</body>
</html>
