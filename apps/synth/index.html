<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Synth Subapp</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    :root {
      --bg: #0a0a0f; 
      --panel: #12121c;
      --border: #26263b;
      --accent: #00e5ff;
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* Engine Sound Selector Rack Control */
    .controls-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .selector-group {
      display: flex;
      background: #07070a;
      padding: 2px;
      border-radius: 6px;
      border: 1px solid #1f1f2e;
    }

    .sound-btn {
      background: transparent;
      border: none;
      color: #5c5c7a;
      padding: 6px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .sound-btn.active {
      background: #1c1c2b;
      color: var(--accent);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
    }

    .status-lamp {
      font-family: monospace;
      font-size: 9px;
      background: #121c12;
      color: #39ff14;
      padding: 3px 6px;
      border-radius: 3px;
      border: 1px solid #091009;
    }

    /* Keyboard Layout */
    .keyboard {
      position: relative;
      display: flex;
      width: 100%;
      height: 200px;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }

    .key {
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    .key.white {
      flex: 1;
      background: #f4f4f9;
      border-right: 1px solid #bdae9e;
      border-bottom: 6px solid #dbd2c4;
      border-radius: 0 0 4px 4px;
      height: 100%;
      z-index: 1;
    }

    .key.white.active {
      background: #e2e2eb;
      border-bottom-width: 2px;
      top: 4px;
    }

    .key.black {
      position: absolute;
      width: 6%;
      height: 60%;
      background: linear-gradient(to bottom, #111 0%, #292929 80%, #000 100%);
      border: 1px solid #000;
      border-radius: 0 0 3px 3px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.4);
      z-index: 2;
    }

    .key.black.active {
      background: #111;
      height: 59%;
    }

    /* Custom absolute alignments for black keys across 2 octaves */
    .k-Csh1 { left: 5.5%; }
    .k-Dsh1 { left: 14.5%; }
    .k-Fsh1 { left: 32.5%; }
    .k-Gsh1 { left: 41.5%; }
    .k-Ash1 { left: 50.5%; }
    .k-Csh2 { left: 69.5%; }
    .k-Dsh2 { left: 78.5%; }
  </style>
</head>
<body>

  <div class="controls-panel">
    <div class="selector-group">
      <button class="sound-btn active" onclick="setEngine('synth', this)">⚡ SYNTH</button>
      <button class="sound-btn" onclick="setEngine('piano', this)">🎹 PIANO</button>
    </div>
    <div id="engine-status" class="status-lamp">READY</div>
  </div>

  <div class="keyboard">
    <!-- Octave 1 White Keys -->
    <div class="key white" data-note="C4" onmousedown="handleNoteOn('C4', this)" onmouseup="handleNoteOff('C4', this)" onmouseleave="handleNoteOff('C4', this)"></div>
    <div class="key white" data-note="D4" onmousedown="handleNoteOn('D4', this)" onmouseup="handleNoteOff('D4', this)" onmouseleave="handleNoteOff('D4', this)"></div>
    <div class="key white" data-note="E4" onmousedown="handleNoteOn('E4', this)" onmouseup="handleNoteOff('E4', this)" onmouseleave="handleNoteOff('E4', this)"></div>
    <div class="key white" data-note="F4" onmousedown="handleNoteOn('F4', this)" onmouseup="handleNoteOff('F4', this)" onmouseleave="handleNoteOff('F4', this)"></div>
    <div class="key white" data-note="G4" onmousedown="handleNoteOn('G4', this)" onmouseup="handleNoteOff('G4', this)" onmouseleave="handleNoteOff('G4', this)"></div>
    <div class="key white" data-note="A4" onmousedown="handleNoteOn('A4', this)" onmouseup="handleNoteOff('A4', this)" onmouseleave="handleNoteOff('A4', this)"></div>
    <div class="key white" data-note="B4" onmousedown="handleNoteOn('B4', this)" onmouseup="handleNoteOff('B4', this)" onmouseleave="handleNoteOff('B4', this)"></div>

    <!-- Octave 2 White Keys -->
    <div class="key white" data-note="C5" onmousedown="handleNoteOn('C5', this)" onmouseup="handleNoteOff('C5', this)" onmouseleave="handleNoteOff('C5', this)"></div>
    <div class="key white" data-note="D5" onmousedown="handleNoteOn('D5', this)" onmouseup="handleNoteOff('D5', this)" onmouseleave="handleNoteOff('D5', this)"></div>
    <div class="key white" data-note="E5" onmousedown="handleNoteOn('E5', this)" onmouseup="handleNoteOff('E5', this)" onmouseleave="handleNoteOff('E5', this)"></div>
    <div class="key white" data-note="F5" onmousedown="handleNoteOn('F5', this)" onmouseup="handleNoteOff('F5', this)" onmouseleave="handleNoteOff('F5', this)"></div>
    <div class="key white" data-note="G5" onmousedown="handleNoteOn('G5', this)" onmouseup="handleNoteOff('G5', this)" onmouseleave="handleNoteOff('G5', this)"></div>
    <div class="key white" data-note="A5" onmousedown="handleNoteOn('A5', this)" onmouseup="handleNoteOff('A5', this)" onmouseleave="handleNoteOff('A5', this)"></div>
    <div class="key white" data-note="B5" onmousedown="handleNoteOn('B5', this)" onmouseup="handleNoteOff('B5', this)" onmouseleave="handleNoteOff('B5', this)"></div>
    <div class="key white" data-note="C6" onmousedown="handleNoteOn('C6', this)" onmouseup="handleNoteOff('C6', this)" onmouseleave="handleNoteOff('C6', this)"></div>

    <!-- Black Keys Overlays -->
    <div class="key black k-Csh1" data-note="C#4" onmousedown="handleNoteOn('C#4', this)" onmouseup="handleNoteOff('C#4', this)" onmouseleave="handleNoteOff('C#4', this)"></div>
    <div class="key black k-Dsh1" data-note="D#4" onmousedown="handleNoteOn('D#4', this)" onmouseup="handleNoteOff('D#4', this)" onmouseleave="handleNoteOff('D#4', this)"></div>
    
    <div class="key black k-Fsh1" data-note="F#4" onmousedown="handleNoteOn('F#4', this)" onmouseup="handleNoteOff('F#4', this)" onmouseleave="handleNoteOff('F#4', this)"></div>
    <div class="key black k-Gsh1" data-note="G#4" onmousedown="handleNoteOn('G#4', this)" onmouseup="handleNoteOff('G#4', this)" onmouseleave="handleNoteOff('G#4', this)"></div>
    <div class="key black k-Ash1" data-note="A#4" onmousedown="handleNoteOn('A#4', this)" onmouseup="handleNoteOff('A#4', this)" onmouseleave="handleNoteOff('A#4', this)"></div>

    <div class="key black k-Csh2" data-note="C#5" onmousedown="handleNoteOn('C#5', this)" onmouseup="handleNoteOff('C#5', this)" onmouseleave="handleNoteOff('C#5', this)"></div>
    <div class="key black k-Dsh2" data-note="D#5" onmousedown="handleNoteOn('D#5', this)" onmouseup="handleNoteOff('D#5', this)" onmouseleave="handleNoteOff('D#5', this)"></div>
  </div>

  <script>
    // 1. Keep your original electronic synthetic sound engine
    const electronicSynth = new Tone.PolySynth(Tone.Synth, {
      oscillator: { type: "sawtooth" },
      envelope: { attack: 0.05, decay: 0.1, sustain: 0.3, release: 1 }
    }).toDestination();

    // 2. Setup the high quality piano sampler asset bank
    const pianoSampler = new Tone.Sampler({
      urls: {
        A0: "A0.mp3", C1: "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3",
        A1: "A1.mp3", C2: "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3",
        A2: "A2.mp3", C3: "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3",
        A3: "A3.mp3", C4: "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3",
        A4: "A4.mp3", C5: "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3",
        A5: "A5.mp3", C6: "C6.mp3", "D#6": "Ds6.mp3", "F#6": "Fs6.mp3",
        A6: "A6.mp3", C7: "C7.mp3", "D#7": "Ds7.mp3", "F#7": "Fs7.mp3",
        A7: "A7.mp3", C8: "C8.mp3"
      },
      baseUrl: "https://tonejs.github.io/audio/salamander/",
      onload: () => {
        document.getElementById('engine-status').innerText = "READY";
      }
    }).toDestination();

    // Set Default Engine
    let activeEngine = electronicSynth;

    function setEngine(type, buttonEl) {
      document.querySelectorAll('.sound-btn').forEach(btn => btn.classList.remove('active'));
      buttonEl.classList.add('active');
      
      if (type === 'piano') {
        activeEngine = pianoSampler;
        document.getElementById('engine-status').innerText = "PIANO LOADING...";
        // If it's already cached/loaded, reset status string right away
        if (pianoSampler.loaded) document.getElementById('engine-status').innerText = "READY";
      } else {
        activeEngine = electronicSynth;
        document.getElementById('engine-status').innerText = "READY";
      }
    }

    // 3. Audio Handlers using the variable active engine
    function handleNoteOn(note, element) {
      if (Tone.context.state !== 'running') Tone.start();
      element.classList.add('active');
      activeEngine.triggerAttack(note);
    }

    function handleNoteOff(note, element) {
      if (element.classList.contains('active')) {
        element.classList.remove('active');
        activeEngine.triggerRelease(note);
      }
    }

    // Mobile hardware support touch handles
    document.querySelectorAll('.key').forEach(key => {
      key.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleNoteOn(key.dataset.note, key);
      });
      key.addEventListener('touchend', (e) => {
        e.preventDefault();
        handleNoteOff(key.dataset.note, key);
      });
    });
  </script>
</body>
</html>
