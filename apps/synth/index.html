<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Studio - Synth</title>
    <!-- Include Tone.js v14 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
        }
        button.active {
            background-color: #007acc;
            border-color: #0098ff;
        }
        #status {
            font-size: 14px;
            color: #aaa;
        }
        #keyboard {
            display: flex;
            position: relative;
            background: #000;
            padding: 5px;
            border-radius: 8px;
            user-select: none;
        }
        .key {
            position: relative;
            cursor: pointer;
        }
        .white-key {
            width: 40px;
            height: 150px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 0 0 4px 4px;
            z-index: 1;
        }
        .white-key:active, .white-key.pressed {
            background-color: #ddd;
        }
        .black-key {
            width: 24px;
            height: 90px;
            background-color: #000;
            border: 1px solid #333;
            border-radius: 0 0 3px 3px;
            position: absolute;
            z-index: 2;
            /* Offset handled by JS structure dynamically or explicit margins */
        }
        .black-key:active, .black-key.pressed {
            background-color: #333;
        }
    </style>
</head>
<body>

    <div id="controls">
        <button id="btn-piano" class="active" onclick="setEngine(piano)">Piano Sampler</button>
        <button id="btn-synth" onclick="setEngine(electronicSynth)">Electronic Synth</button>
        <span id="status">Status: <strong id="engineStatus">INIT</strong></span>
    </div>

    <div id="keyboard">
        <!-- White Keys -->
        <div class="key white-key" onmousedown="handleNoteOn('C4')" onmouseup="handleNoteOff('C4')" onmouseleave="handleNoteOff('C4')"></div>
        <div class="key white-key" onmousedown="handleNoteOn('D4')" onmouseup="handleNoteOff('D4')" onmouseleave="handleNoteOff('D4')"></div>
        <div class="key white-key" onmousedown="handleNoteOn('E4')" onmouseup="handleNoteOff('E4')" onmouseleave="handleNoteOff('E4')"></div>
        <div class="key white-key" onmousedown="handleNoteOn('F4')" onmouseup="handleNoteOff('F4')" onmouseleave="handleNoteOff('F4')"></div>
        <div class="key white-key" onmousedown="handleNoteOn('G4')" onmouseup="handleNoteOff('G4')" onmouseleave="handleNoteOff('G4')"></div>
        <div class="key white-key" onmousedown="handleNoteOn('A4')" onmouseup="handleNoteOff('A4')" onmouseleave="handleNoteOff('A4')"></div>
        <div class="key white-key" onmousedown="handleNoteOn('B4')" onmouseup="handleNoteOff('B4')" onmouseleave="handleNoteOff('B4')"></div>
        <div class="key white-key" onmousedown="handleNoteOn('C5')" onmouseup="handleNoteOff('C5')" onmouseleave="handleNoteOff('C5')"></div>

        <!-- Black Keys positioned absolutely over white structural steps -->
        <div class="key black-key" style="left: 33px;" onmousedown="handleNoteOn('C#4')" onmouseup="handleNoteOff('C#4')" onmouseleave="handleNoteOff('C#4')"></div>
        <div class="key black-key" style="left: 75px;" onmousedown="handleNoteOn('D#4')" onmouseup="handleNoteOff('D#4')" onmouseleave="handleNoteOff('D#4')"></div>
        <div class="key black-key" style="left: 159px;" onmousedown="handleNoteOn('F#4')" onmouseup="handleNoteOff('F#4')" onmouseleave="handleNoteOff('F#4')"></div>
        <div class="key black-key" style="left: 201px;" onmousedown="handleNoteOn('G#4')" onmouseup="handleNoteOff('G#4')" onmouseleave="handleNoteOff('G#4')"></div>
        <div class="key black-key" style="left: 243px;" onmousedown="handleNoteOn('A#4')" onmouseup="handleNoteOff('A#4')" onmouseleave="handleNoteOff('A#4')"></div>
    </div>

    <script>
        // =========================================================================
        // 1. DECLARE GLOBAL STATE AND BUS ROUTING VARIABLES FIRST
        // =========================================================================
        let activeEngine = null;
        let contextUnlocked = false;

        // Custom recording/routing channel
        const recordingBus = new Tone.Gain().toDestination();

        // =========================================================================
        // 2. SIGNAL PROCESSING EFFECTS CHAINS
        // =========================================================================
        const chorusFX = new Tone.Chorus(4, 2.5, 0.5).start();
        const delayFX = new Tone.FeedbackDelay("8n", 0.3);
        const reverbFX = new Tone.Reverb({ roomSize: 0.7, wet: 0.1 });

        // Initialize FX properties safely
        delayFX.wet.value = 0;
        chorusFX.wet.value = 0;

        // Route main effect pathways to master/recording layout
        chorusFX.connect(delayFX);
        delayFX.connect(reverbFX);
        reverbFX.connect(recordingBus);

        // =========================================================================
        // 3. INSTRUMENT CONFIGURATIONS & GENERATION
        // =========================================================================
        
        // A. Electronic PolySynth Configuration
        const electronicSynth = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "sawtooth" },
            envelope: { attack: 0.05, decay: 0.1, sustain: 0.3, release: 1 }
        }).connect(chorusFX);

        // B. Piano Sampler Configuration using high-stability CORS endpoint
        const piano = new Tone.Sampler({
            urls: {
                "A0": "A0.mp3", "C1": "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3", "A1": "A1.mp3",
                "C2": "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3", "A2": "A2.mp3",
                "C3": "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3", "A3": "A3.mp3",
                "C4": "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3", "A4": "A4.mp3",
                "C5": "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3", "A5": "A5.mp3",
                "C6": "C6.mp3", "D#6": "Ds6.mp3", "F#6": "Fs6.mp3", "A6": "A6.mp3",
                "C7": "C7.mp3", "D#7": "Ds7.mp3", "F#7": "Fs7.mp3", "A7": "A7.mp3", "C8": "C8.mp3"
            },
            baseUrl: "https://nbrosowsky.github.io/tonejs-instruments/samples/piano/",
            onload: () => {
                console.log("Piano soundfont ready.");
                const statusEl = document.getElementById('engineStatus');
                if (statusEl && activeEngine === piano) {
                    statusEl.innerText = "READY";
                }
            },
            onerror: (err) => {
                console.error("Sampler loading error:", err);
                const statusEl = document.getElementById('engineStatus');
                if (statusEl) statusEl.innerText = "ERROR LOADING ASSETS";
            }
        }).toDestination();

        // Connect the sampler elements safely across your buses too
        piano.connect(recordingBus);

        // Set default run execution target engine
        activeEngine = piano;

        // =========================================================================
        // 4. INTERACTIVE EVENT HANDLERS & USER INTERFACE LOGIC
        // =========================================================================
        
        async function ensureAudioContext() {
            if (!contextUnlocked) {
                try {
                    await Tone.start();
                    contextUnlocked = true;
                    console.log("AudioContext successfully unlocked via user gesture.");
                    
                    // Warm up effects cleanly after interaction starts
                    if (chorusFX && chorusFX.warmUp) chorusFX.warmUp();
                } catch (e) {
                    console.error("AudioContext Unlock failure:", e);
                }
            }
        }

        function setEngine(engine) {
            if (!engine) return;
            activeEngine = engine;
            
            // Toggle view button states dynamically
            document.getElementById('btn-piano').classList.toggle('active', engine === piano);
            document.getElementById('btn-synth').classList.toggle('active', engine === electronicSynth);

            const statusEl = document.getElementById('engineStatus');
            if (statusEl) {
                if (engine === piano) {
                    statusEl.innerText = piano.loaded ? "READY" : "LOADING AUDIO...";
                } else {
                    statusEl.innerText = "READY";
                }
            }
            console.log("Engine swapped successfully.");
        }

        async function handleNoteOn(note) {
            await ensureAudioContext();
            if (!activeEngine) return;

            try {
                // Ensure samples are fully pulled down before firing sampler triggers
                if (activeEngine === piano && !piano.loaded) {
                    console.warn("Sampler notes are still buffering...");
                    return;
                }
                activeEngine.triggerAttack(note);
            } catch (err) {
                console.error("Trigger attack failure:", err);
            }
        }

        function handleNoteOff(note) {
            if (!activeEngine) return;
            try {
                activeEngine.triggerRelease(note);
            } catch (err) {
                console.error("Trigger release failure:", err);
            }
        }
    </script>
</body>
</html>
