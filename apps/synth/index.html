
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Synth</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --panel: #12121c;
      --border: #26263b;
      --text: #e2e2e9;
      --text-dim: #6c6c84;'m
      --accent: #00e5ff;
      --accent-alt: #9d4edd;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      padding: 20px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      user-select: none;
    }
    button {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    
/* Initial unpressed state: Dark text on glowing cyan background */
.btn-record {
  background-color: var(--accent);
  color: #0a0a0f !important; /* Forces dark contrast on cyan */
  width: 100%;
}

/* Active recording state: White text on pulsing red background */
.btn-recording {
  background-color: #ef4444 !important; /* Cyberpunk danger red */
  color: #ffffff !important; /* Forces bright white text contrast */
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.6; }
  100% { opacity: 1; }
}
    .container {
      width: 100%;
      max-width: 950px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      flex-grow: 1;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 25px;
    }
/* 1. GLOBAL STYLE (Put this first) */
h1 {
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 2rem;       /* Big and clean on desktop/portrait */
  letter-spacing: 1px;
  margin-bottom: 5px;
  text-transform: uppercase;
}

.subtitle {
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  color: #94a3b8;
  font-size: 0.95rem;
  margin-bottom: 25px;
}
    select {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 9px;
      border-radius: 4px;
    }
    .octave-display {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 70px;
      text-align: center;
    }

    /* ─── Keyboard ─────────────────────────────────────────── */
    .keyboard-wrap {
      width: 100%;
      overflow-x: auto;
      padding-bottom: 10px;
    }
    .keyboard {
      position: relative;
      display: flex;
      height: 180px;
      min-width: 700px;
    }
    .white-key {
      position: relative;
      flex: 1;
      background: #e9e9f2;
      border: 1px solid var(--border);
      border-radius: 0 0 6px 6px;
      cursor: pointer;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 8px;
      font-size: 10px;
      color: #555;
      transition: background 0.05s ease;
    }
    .white-key.pressed {
      background: var(--accent);
    }
    .black-key {
      position: absolute;
      top: 0;
      width: 6.5%;
      height: 62%;
      background: #14141f;
      border: 1px solid #000;
      border-radius: 0 0 5px 5px;
      cursor: pointer;
      z-index: 2;
      transition: background 0.05s ease;
    }
    .black-key.pressed {
      background: var(--accent-alt);
    }

    /* ─── Edit panel ───────────────────────────────────────── */
    .synth-edit-panel {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: none;
    }
    .synth-edit-panel.visible { display: block; }
    .editor-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .editor-row label { width: 110px; }
    .editor-row input[type="range"] { flex: 1; }

/* 2. LANDSCAPE OVERRIDES (Put this at the very bottom of your styles) */
@media (max-height: 500px) and (orientation: landscape) {
  body {
    padding: 8px; /* Keeps padding tight to save screen real estate */
  }
  h1 {
    font-size: 1.3rem;   /* Automatically shrinks just the size when flipped sideways */
    margin-bottom: 2px;
  }
  
  .subtitle {
    display: none;       /* Hides the subtitle to preserve vertical room */
  }
  
  /* Stack synth control modules (Oscillator, Filter, Envelope) vertically */
  .synth-controls {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .knob-panel, .adsr-envelope {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* Put knobs into a clean 2-column grid instead of a squished row */
    gap: 10px;
  }

  /* Make the piano keyboard scrollable so keys stay wide enough to play chords */
  .keyboard-container {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 10px;
  }

  .piano-keyboard {
    display: flex;
    width: max-content; /* Forces the keyboard to maintain its full natural width */
  }

  .white-key {
    width: 40px; /* Big enough for a finger tap */
    height: 120px;
    flex-shrink: 0;
  }
}
  </style>
</head>
<body>

<div class="container">
<h1>Polyphonic Synth</h1>
  <div class="subtitle">Play chords and design retro electronic tones</div>
  <header>
    <div class="controls">
      <select id="waveSelect">
        <option value="sawtooth">Sawtooth</option>
        <option value="square">Square</option>
        <option value="triangle">Triangle</option>
        <option value="sine">Sine</option>
      </select>
      <button id="octaveDownBtn">Oct −</button>
      <div class="octave-display" id="octaveDisplay">Octave 4</div>
      <button id="octaveUpBtn">Oct +</button>
      <button id="toggleEditBtn">🎛️ Show Edit Controls</button>


      <!-- Add this to your header controls -->
      <button id="playBtn">▶ Play</button>
    <button id="recordBtn">🔴 Record</button>
      
    </div>
  </header>

  <div class="keyboard-wrap">
    <div class="keyboard" id="keyboard"></div>
  </div>

  <div class="synth-edit-panel" id="synthEditor">
    <div id="globalEditorControls"></div>
  </div>
</div>

<script>
  // ─── Keyboard layout ──────────────────────────────────────────
  const WHITE_NOTES = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
  const BLACK_NOTES = { 'C': 'C#', 'D': 'D#', 'F': 'F#', 'G': 'G#', 'A': 'A#' };
  const NUM_OCTAVES_SHOWN = 2;
  let baseOctave = 4;

  let isRecording = false;
  let recorder = null;
  const activeNotes = new Set();

  // ─── Sound engine ─────────────────────────────────────────────
  const synth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type: 'sawtooth' },
    envelope: { attack: 0.02, decay: 0.2, sustain: 0.4, release: 0.8 }
  }).toDestination();
  synth.volume.value = -6;

  document.getElementById('waveSelect').addEventListener('change', (e) => {
    synth.set({ oscillator: { type: e.target.value } });
  });

  // ─── Build keyboard ───────────────────────────────────────────
  function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';

    const whiteKeyEls = [];
    let whiteIndex = 0;

    for (let o = 0; o < NUM_OCTAVES_SHOWN; o++) {
      const octave = baseOctave + o;
      WHITE_NOTES.forEach(note => {
        const key = document.createElement('div');
        key.className = 'white-key';
        key.dataset.note = `${note}${octave}`;
        key.textContent = `${note}${octave}`;
        kb.appendChild(key);
        whiteKeyEls.push(key);
        attachKeyEvents(key, key.dataset.note);
        whiteIndex++;
      });
    }

    // Position black keys relative to white key width
    const totalWhite = whiteKeyEls.length;
    const whiteKeyPercent = 100 / totalWhite;

    let wi = 0;
    for (let o = 0; o < NUM_OCTAVES_SHOWN; o++) {
      const octave = baseOctave + o;
      WHITE_NOTES.forEach(note => {
        if (BLACK_NOTES[note]) {
          const blackNote = `${BLACK_NOTES[note]}${octave}`;
          const bk = document.createElement('div');
          bk.className = 'black-key';
          bk.dataset.note = blackNote;
          bk.style.left = `calc(${(wi + 1) * whiteKeyPercent}% - 3.25%)`;
          kb.appendChild(bk);
          attachKeyEvents(bk, blackNote);
        }
        wi++;
      });
    }

    document.getElementById('octaveDisplay').textContent =
      `Octave ${baseOctave}–${baseOctave + NUM_OCTAVES_SHOWN - 1}`;
  }

  function attachKeyEvents(el, note) {
    const press = async (e) => {
      e.preventDefault();
      await Tone.start();
      if (activeNotes.has(note)) return;
      activeNotes.add(note);
      el.classList.add('pressed');
      synth.triggerAttack(note);
    };
    const release = (e) => {
      if (e) e.preventDefault();
      if (!activeNotes.has(note)) return;
      activeNotes.delete(note);
      el.classList.remove('pressed');
      synth.triggerRelease(note);
    };

    el.addEventListener('mousedown', press);
    el.addEventListener('mouseup', release);
    el.addEventListener('mouseleave', release);
    el.addEventListener('touchstart', press, { passive: false });
    el.addEventListener('touchend', release, { passive: false });
    el.addEventListener('touchcancel', release, { passive: false });
  }

  document.getElementById('octaveDownBtn').addEventListener('click', () => {
    if (baseOctave > 1) { baseOctave--; buildKeyboard(); }
  });
  document.getElementById('octaveUpBtn').addEventListener('click', () => {
    if (baseOctave < 6) { baseOctave++; buildKeyboard(); }
  });

  // ─── Computer keyboard support (optional but handy) ──────────
  const KEY_MAP = {
    'a': 'C', 'w': 'C#', 's': 'D', 'e': 'D#', 'd': 'E',
    'f': 'F', 't': 'F#', 'g': 'G', 'y': 'G#', 'h': 'A',
    'u': 'A#', 'j': 'B'
  };
  const heldKeys = new Set();

  window.addEventListener('keydown', async (e) => {
    const note = KEY_MAP[e.key.toLowerCase()];
    if (!note || heldKeys.has(e.key)) return;
    heldKeys.add(e.key);
    await Tone.start();
    const fullNote = `${note}${baseOctave}`;
    if (!activeNotes.has(fullNote)) {
      activeNotes.add(fullNote);
      synth.triggerAttack(fullNote);
      const el = document.querySelector(`[data-note="${fullNote}"]`);
      if (el) el.classList.add('pressed');
    }
  });

  window.addEventListener('keyup', (e) => {
    const note = KEY_MAP[e.key.toLowerCase()];
    if (!note) return;
    heldKeys.delete(e.key);
    const fullNote = `${note}${baseOctave}`;
    activeNotes.delete(fullNote);
    synth.triggerRelease(fullNote);
    const el = document.querySelector(`[data-note="${fullNote}"]`);
    if (el) el.classList.remove('pressed');
  });

  // ─── Edit panel ────────────────────────────────────────────────
  function buildEditorControls() {
    const wrap = document.getElementById('globalEditorControls');
    wrap.innerHTML = '';

    const rows = [
      { label: 'Volume', min: -40, max: 0, value: synth.volume.value,
        onInput: v => { synth.volume.value = parseFloat(v); } },
      { label: 'Attack', min: 0, max: 1, step: 0.01, value: 0.02,
        onInput: v => synth.set({ envelope: { attack: parseFloat(v) } }) },
      { label: 'Decay', min: 0, max: 1, step: 0.01, value: 0.2,
        onInput: v => synth.set({ envelope: { decay: parseFloat(v) } }) },
      { label: 'Sustain', min: 0, max: 1, step: 0.01, value: 0.4,
        onInput: v => synth.set({ envelope: { sustain: parseFloat(v) } }) },
      { label: 'Release', min: 0, max: 2, step: 0.01, value: 0.8,
        onInput: v => synth.set({ envelope: { release: parseFloat(v) } }) }
    ];

    rows.forEach(r => {
      const row = document.createElement('div');
      row.className = 'editor-row';

      const label = document.createElement('label');
      label.textContent = r.label;
      row.appendChild(label);

      const slider = document.createElement('input');
      slider.type = 'range';
      slider.min = r.min;
      slider.max = r.max;
      slider.step = r.step || 1;
      slider.value = r.value;
      slider.addEventListener('input', () => r.onInput(slider.value));
      row.appendChild(slider);

      wrap.appendChild(row);
    });
  }

  document.getElementById('toggleEditBtn').addEventListener('click', () => {
    const panel = document.getElementById('synthEditor');
    const btn = document.getElementById('toggleEditBtn');
    const willShow = !panel.classList.contains('visible');
    panel.classList.toggle('visible');
    btn.textContent = willShow ? '🎛️ Hide Edit Controls' : '🎛️ Show Edit Controls';
    if (willShow && document.getElementById('globalEditorControls').children.length === 0) {
      buildEditorControls();
    }
  });

  // ─── Recording + handoff to Tracks (same flow as Beat Maker) ──
  async function recordWav() {
    const btn = document.getElementById('recordBtn');
    await Tone.start();

    if (!isRecording) {
      if (!recorder) {
        recorder = new Tone.Recorder();
        Tone.Destination.connect(recorder);
      }
      // 1. Tell the parent frame to broadcast a START_AUDIO signal 
    // so Multitrack starts playing back your timeline tracks immediately!
    window.parent.postMessage({ action: 'REQUEST_PLAY', bpm: Tone.Transport.bpm.value || 120 }, '*');
      
      recorder.start();
      isRecording = true;
      
      btn.textContent = '⏹️ Stop Recording';
      btn.className = 'btn-recording';

    } else {
      const recording = await recorder.stop();

      // 2. Tell the parent frame to pause/stop playback now that recording is finished
    window.parent.postMessage({ action: 'REQUEST_STOP' }, '*');
      
      // Release any held notes so nothing rings on after recording stops
      activeNotes.forEach(note => synth.triggerRelease(note));
      activeNotes.clear();
      document.querySelectorAll('.pressed').forEach(el => el.classList.remove('pressed'));

      // ─── CONVERT BLOB TO ARRAYBUFFER ───
      // Use the built-in arrayBuffer() method on the audio blob
      const audioBuffer = await recording.arrayBuffer();

      // Use the exact same action and payload structure as the Beat Maker
      window.parent.postMessage({
        action: 'ADD_TRACK',
        audioBuffer: audioBuffer,
        trackName: `Synth_${Date.now()}` // Dynamic timestamp name so recordings don't overwrite each other
      }, '*');
      
      window.parent.postMessage({ action: 'SWITCH_APP', app: 'multitrack' }, '*');

      isRecording = false;
      btn.textContent = '🔴Record';
      btn.className = 'btn-record';
    }
  }

  // Inside Synth/Multitrack index.html
window.addEventListener('message', (event) => {
  if (event.data.action === 'START_AUDIO') {
    Tone.start(); // Unlock audio
    Tone.Transport.bpm.value = event.data.bpm || 120
    Tone.Transport.start(); // Start the timeline
  }

  if (event.data.action === 'STOP_AUDIO') {
// ─── THE FIX ───
    // Always stop the local timeline transport cleanly when requested globally.
    // If we were recording, recordWav() has already captured the buffer, so it is safe to halt!
    if (isRecording) return; 

    Tone.Transport.stop();
  }
});

// Send the request when your internal Play button is pressed
document.getElementById('playBtn').addEventListener('click', () => {
  window.parent.postMessage({ action: 'REQUEST_PLAY', bpm: 120 }, '*');
});

  document.getElementById('recordBtn').addEventListener('click', recordWav);

  // ─── Boot ───────────────────────────────────────────────────────
  buildKeyboard();

  // Tell the parent studio we are alive!
  window.parent.postMessage({ action: 'SYNTH_READY' }, '*');
</script>
</body>
</html>
