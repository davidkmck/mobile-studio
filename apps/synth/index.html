<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Synth Subapp</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --panel: #12121c;
      --border: #26263b;
      --accent: #00e5ff;
      --accent-fx: #d400ff;
    }

    * { box-sizing: border-box; }
    
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100dvh;
      overflow: hidden;
    }

    body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 100%;
    }

    /* ==========================================================================
       1. TOP MASTER PANEL (Mobile Accessible Layout)
       ========================================================================== */
    .controls-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .transport-group {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .right-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      overflow-x: auto;
    }

    .selector-group {
      display: flex;
      background: #07070a;
      padding: 2px;
      border-radius: 6px;
      border: 1px solid #1f1f2e;
    }

    .sound-btn {
      background: transparent;
      border: none;
      color: #5c5c7a;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .sound-btn.active {
      background: #1c1c2b;
      color: var(--accent);
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
    }

    .status-lamp {
      font-family: monospace;
      font-size: 9px;
      background: #121c12;
      color: #39ff14;
      padding: 4px 8px;
      border-radius: 3px;
      border: 1px solid #091009;
      white-space: nowrap;
    }

    .btn {
      background: #1c1c2b;
      border: 1px solid var(--border);
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:active {
      background: #26263b;
    }

    .btn-toggle-panel {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-toggle-panel.active-state {
      background: var(--accent);
      color: #000;
    }

    .btn-toggle-fx {
      border-color: var(--accent-fx);
      color: var(--accent-fx);
    }
    .btn-toggle-fx.active-state {
      background: var(--accent-fx);
      color: #fff;
    }

    .btn-record {
      background: #2b1c1c;
      border-color: #5c2626;
      color: #ff4444;
    }
    .btn-record.recording {
      background: #ff4444;
      color: #fff;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    /* ==========================================================================
       2. SEPARATED CONFIGURATION PANELS
       ========================================================================== */
    .synth-tweaker-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      gap: 12px;
      overflow-x: auto;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .synth-tweaker-panel.collapsed {
      display: none !important;
    }

    .synth-tweaker-panel::-webkit-scrollbar {
      display: none;
    }

    .tweak-section {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #09090f;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #1a1a29;
    }

    .section-title {
      font-size: 10px;
      font-weight: 800;
      color: #5c5c7a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      writing-mode: vertical-lr;
      transform: rotate(180deg);
    }

    .knob-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .knob-box label {
      font-size: 9px;
      color: #8c8ca3;
      font-weight: 600;
    }

    .knob-box input[type="range"] {
      width: 55px;
      accent-color: var(--accent);
    }

    .fx-box input[type="range"] {
      accent-color: var(--accent-fx);
    }

    .select-dark {
      background: #1c1c2b;
      border: 1px solid var(--border);
      color: #fff;
      padding: 4px 6px;
      font-size: 11px;
      border-radius: 4px;
      outline: none;
    }

    /* ==========================================================================
       3. KEYBOARD AREA
       ========================================================================== */
    .keyboard-space {
      flex: 1;
      width: 100%;
      position: relative;
    }

    .keyboard {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }

    .key {
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    .key.white {
      flex: 1;
      background: #f4f4f9;
      border-right: 1px solid #bdae9e;
      border-bottom: 6px solid #dbd2c4;
      border-radius: 0 0 4px 4px;
      height: 100%;
      z-index: 1;
    }

    .key.white.active {
      background: #e2e2eb;
      border-bottom-width: 2px;
      transform: translateY(4px);
    }

    .key.white:last-child {
      border-right: none;
    }

    .key.black {
      position: absolute;
      width: 6%;
      height: 58%;
      background: linear-gradient(to bottom, #111 0%, #292929 80%, #000 100%);
      border: 1px solid #000;
      border-radius: 0 0 3px 3px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.4);
      z-index: 2;
    }

    .key.black.active {
      background: #111;
      transform: translateY(2px);
      height: 57%;
    }

    .k-Csh1 { left: 5.5%; }
    .k-Dsh1 { left: 14.5%; }
    .k-Fsh1 { left: 32.5%; }
    .k-Gsh1 { left: 41.5%; }
    .k-Ash1 { left: 50.5%; }
    .k-Csh2 { left: 69.5%; }
    .k-Dsh2 { left: 78.5%; }
  </style>
</head>
<body>

  <!-- Top Utilities Bar -->
  <div class="controls-panel">
    <div class="transport-group">
      <button id="record-btn" class="btn btn-record" onclick="toggleRecord()">REC</button>
      <button id="play-btn" class="btn" onclick="togglePlay()">PLAY</button>
      <button id="toggle-panel-btn" class="btn btn-toggle-panel active-state" onclick="togglePanel('controls')">🎛️ SYNTH</button>
      <button id="toggle-fx-btn" class="btn btn-toggle-fx" onclick="togglePanel('effects')">✨ EFFECTS</button>
    </div>

    <div class="right-controls">
      <div class="selector-group">
        <button class="sound-btn active" onclick="setEngine('synth', this)">⚡ SYNTH</button>
        <button class="sound-btn" onclick="setEngine('piano', this)">🎹 PIANO</button>
      </div>
      <div id="engine-status" class="status-lamp">READY</div>
    </div>
  </div>

  <!-- Panel 1: Synth Parameters -->
  <div id="tweaker-panel" class="synth-tweaker-panel">
    <div class="tweak-section">
      <span class="section-title">Osc</span>
      <div class="knob-box">
        <label>Wave</label>
        <select id="wave-type" class="select-dark" onchange="updateParameters()">
          <option value="sawtooth">Sawtooth</option>
          <option value="square">Square</option>
          <option value="sine">Sine</option>
          <option value="triangle">Triangle</option>
        </select>
      </div>
      <div class="knob-box">
        <label>Octave</label>
        <select id="octave-shift" class="select-dark" onchange="shiftOctave()">
          <option value="-2">C2 - Bass</option>
          <option value="-1">C3 - Low</option>
          <option value="0" selected>C4 - Mid</option>
          <option value="1">C5 - High</option>
          <option value="2">C6 - Lead</option>
        </select>
      </div>
    </div>

    <div class="tweak-section">
      <span class="section-title">Env</span>
      <div class="knob-box">
        <label>Attack</label>
        <input id="p-attack" type="range" min="0.01" max="1" step="0.05" value="0.05" oninput="updateParameters()">
      </div>
      <div class="knob-box">
        <label>Decay</label>
        <input id="p-decay" type="range" min="0.01" max="1" step="0.05" value="0.1" oninput="updateParameters()">
      </div>
      <div class="knob-box">
        <label>Sustain</label>
        <input id="p-sustain" type="range" min="0" max="1" step="0.1" value="0.3" oninput="updateParameters()">
      </div>
      <div class="knob-box">
        <label>Release</label>
        <input id="p-release" type="range" min="0.1" max="3" step="0.1" value="1.0" oninput="updateParameters()">
      </div>
    </div>

    <div class="tweak-section">
      <span class="section-title">Amp</span>
      <div class="knob-box">
        <label>Volume</label>
        <input id="p-volume" type="range" min="-30" max="0" step="1" value="-6" oninput="updateParameters()">
      </div>
    </div>
  </div>

  <!-- Panel 2: Effects Panel -->
  <div id="effects-panel" class="synth-tweaker-panel collapsed">
    <div class="tweak-section">
      <span class="section-title" style="color: var(--accent-fx);">FX</span>
      <div class="knob-box fx-box">
        <label>Chorus</label>
        <input id="fx-chorus" type="range" min="0" max="1" step="0.05" value="0" oninput="updateFX()">
      </div>
      <div class="knob-box fx-box">
        <label>Echo (Delay)</label>
        <input id="fx-delay" type="range" min="0" max="1" step="0.05" value="0" oninput="updateFX()">
      </div>
      <div class="knob-box fx-box">
        <label>Reverb</label>
        <input id="fx-reverb" type="range" min="0" max="1" step="0.05" value="0.1" oninput="updateFX()">
      </div>
    </div>
  </div>

  <!-- Piano -->
  <div class="keyboard-space">
    <div class="keyboard">
      <!-- White Keys -->
      <div class="key white" data-base-note="C" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key white" data-base-note="D" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key white" data-base-note="E" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key white" data-base-note="F" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key white" data-base-note="G" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key white" data-base-note="A" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key white" data-base-note="B" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>

      <div class="key white" data-base-note="C+" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key white" data-base-note="D+" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key white" data-base-note="E+" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key white" data-base-note="F+" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key white" data-base-note="G+" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key white" data-base-note="A+" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key white" data-base-note="B+" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key white" data-base-note="C++" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>

      <!-- Black Keys Overlays -->
      <div class="key black k-Csh1" data-base-note="C#" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key black k-Dsh1" data-base-note="D#" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      
      <div class="key black k-Fsh1" data-base-note="F#" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key black k-Gsh1" data-base-note="G#" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key black k-Ash1" data-base-note="A#" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>

      <div class="key black k-Csh2" data-base-note="C#+" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
      <div class="key black k-Dsh2" data-base-note="D#+" onmousedown="handleNoteOn(this)" onmouseup="handleNoteOff(this)" onmouseleave="handleNoteOff(this)"></div>
    </div>
  </div>

  <script>
    // Explicitly setup MediaRecorder constraints via standard browser-supported formats 
    let mimeTypeSelection = "audio/webm;codecs=opus";
    if (!MediaRecorder.isTypeSupported(mimeTypeSelection)) {
      mimeTypeSelection = "audio/webm";
    }

    const recordingBus = new Tone.Gain();
    const recorder = new Tone.Recorder({ mimeType: mimeTypeSelection });
    recordingBus.connect(recorder);


// ==========================================================================
    // 1. SIGNAL PROCESSING EFFECTS CHAINS (Keep variables globally scoped)
    // ==========================================================================
    const chorusFX = new Tone.Chorus(4, 2.5, 0);
    const delayFX = new Tone.FeedbackDelay("8n", 0.3);
    const reverbFX = new Tone.Reverb({ roomSize: 0.7, wet: 0.1 });

    delayFX.wet.value = 0;
    chorusFX.wet.value = 0;

    // Remove the instant chorusFX.start() call here! It's causing the suspension.

    chorusFX.connect(delayFX);
    delayFX.connect(reverbFX);
    reverbFX.toDestination(); 

    reverbFX.connect(recordingBus);

    // ==========================================================================
    // HELPER TO GUARANTEE CONTEXT IS RESUMED
    // ==========================================================================
    async function ensureAudioContext() {
      if (Tone.context.state !== 'running') {
        await Tone.start();
        // Safe to wake up internal source components now that context is active
        chorusFX.start(); 
      }
    }

    // ==========================================================================
    // 2. MODIFIED NOTE INTERACTION MECHANICS
    // ==========================================================================
    async function handleNoteOn(element) {
      await ensureAudioContext(); // Wake up AudioContext on interactive click
      element.classList.add('active');
      const targetNote = getTargetNoteString(element.dataset.baseNote);
      activeEngine.triggerAttack(targetNote);
    }

    function handleNoteOff(element) {
      if (element.classList.contains('active')) {
        element.classList.remove('active');
        const targetNote = getTargetNoteString(element.dataset.baseNote);
        activeEngine.triggerRelease(targetNote);
      }
    }

    // ==========================================================================
    // 3. UPDATED TRANSPORT WAKEUP
    // ==========================================================================
    async function togglePlay() {
      await ensureAudioContext();
      isPlaying = !isPlaying;
      const btn = document.getElementById('play-btn');
      
      if (isPlaying) {
        btn.innerText = "STOP";
        window.parent.postMessage({ action: 'REQUEST_PLAY' }, '*');
      } else {
        btn.innerText = "PLAY";
        window.parent.postMessage({ action: 'REQUEST_STOP' }, '*');
      }
    }

    async function toggleRecord() {
      await ensureAudioContext();
      
      const recBtn = document.getElementById('record-btn');
      const playBtn = document.getElementById('play-btn');
      
      isRecording = !isRecording;

      if (isRecording) {
        recBtn.innerText = "STOP REC";
        recBtn.classList.add('recording');
        
        recorder.start();
        
        isPlaying = true;
        playBtn.innerText = "STOP";
        window.parent.postMessage({ action: 'REQUEST_PLAY' }, '*');
      } else {
        recBtn.innerText = "REC";
        recBtn.classList.remove('recording');
        
        isPlaying = false;
        playBtn.innerText = "PLAY";
        window.parent.postMessage({ action: 'REQUEST_STOP' }, '*');
        
        document.getElementById('engine-status').innerText = "SAVING...";
        
        try {
          const rawBlob = await recorder.stop();
          document.getElementById('engine-status').innerText = "READY";

          const trackName = activeEngine === pianoSampler ? 'Keyboard Piano' : 'Keyboard Synth';
          
          const standardizedBlob = new Blob([rawBlob], { type: mimeTypeSelection });
          const objectUrl = URL.createObjectURL(standardizedBlob);

          // Standardized interface key matching
          window.parent.postMessage({
            action: 'ADD_CLIP_TO_TIMELINE',
            audioBlob: standardizedBlob, 
            blob: standardizedBlob,
            url: objectUrl,
            audioUrl: objectUrl,
            trackName: trackName,
            mimeType: mimeTypeSelection
          }, '*');
          
          window.parent.postMessage({ action: 'SWITCH_APP', app: 'multitrack' }, '*');
        } catch (err) {
          console.error("Recording acquisition failure:", err);
          document.getElementById('engine-status').innerText = "ERR REC";
        }
      }
    }



    function updateParameters() {
      const wave = document.getElementById('wave-type').value;
      const attack = parseFloat(document.getElementById('p-attack').value);
      const decay = parseFloat(document.getElementById('p-decay').value);
      const sustain = parseFloat(document.getElementById('p-sustain').value);
      const release = parseFloat(document.getElementById('p-release').value);
      const volume = parseFloat(document.getElementById('p-volume').value);

      electronicSynth.set({
        oscillator: { type: wave },
        envelope: { attack, decay, sustain, release }
      });
      electronicSynth.volume.value = volume;
      pianoSampler.volume.value = volume;
    }

    function updateFX() {
      chorusFX.wet.value = parseFloat(document.getElementById('fx-chorus').value);
      delayFX.wet.value = parseFloat(document.getElementById('fx-delay').value);
      reverbFX.wet.value = parseFloat(document.getElementById('fx-reverb').value);
    }

    function shiftOctave() {
      currentOctaveBase = 4 + parseInt(document.getElementById('octave-shift').value);
    }

    function setEngine(type, buttonEl) {
      document.querySelectorAll('.sound-btn').forEach(btn => btn.classList.remove('active'));
      buttonEl.classList.add('active');
      
      if (type === 'piano') {
        activeEngine = pianoSampler;
        document.getElementById('engine-status').innerText = pianoSampler.loaded ? "READY" : "LOADING PIANO...";
      } else {
        activeEngine = electronicSynth;
        document.getElementById('engine-status').innerText = "READY";
      }
    }

    function getTargetNoteString(baseToken) {
      let octave = currentOctaveBase;
      let cleanNote = baseToken;

      if (baseToken.includes('++')) {
        octave += 2;
        cleanNote = baseToken.replace('++', '');
      } else if (baseToken.includes('+')) {
        octave += 1;
        cleanNote = baseToken.replace('+', '');
      }
      return `${cleanNote}${octave}`;
    }

    // ==========================================================================
    // 3. TRANSPORT MANAGEMENT WITH HYBRID BLOB/URL REDIRECTS
    // ==========================================================================
    let isPlaying = false;
    let isRecording = false;

    function togglePlay() {
      if (Tone.context.state !== 'running') Tone.start();
      isPlaying = !isPlaying;
      const btn = document.getElementById('play-btn');
      
      if (isPlaying) {
        btn.innerText = "STOP";
        window.parent.postMessage({ action: 'REQUEST_PLAY' }, '*');
      } else {
        btn.innerText = "PLAY";
        window.parent.postMessage({ action: 'REQUEST_STOP' }, '*');
      }
    }

    async function toggleRecord() {
      if (Tone.context.state !== 'running') await Tone.start();
      
      const recBtn = document.getElementById('record-btn');
      const playBtn = document.getElementById('play-btn');
      
      isRecording = !isRecording;

      if (isRecording) {
        recBtn.innerText = "STOP REC";
        recBtn.classList.add('recording');
        
        recorder.start();
        
        isPlaying = true;
        playBtn.innerText = "STOP";
        window.parent.postMessage({ action: 'REQUEST_PLAY' }, '*');
      } else {
        recBtn.innerText = "REC";
        recBtn.classList.remove('recording');
        
        isPlaying = false;
        playBtn.innerText = "PLAY";
        window.parent.postMessage({ action: 'REQUEST_STOP' }, '*');
        
        document.getElementById('engine-status').innerText = "SAVING...";
        
        try {
          const rawBlob = await recorder.stop();
          document.getElementById('engine-status').innerText = "READY";

          const trackName = activeEngine === pianoSampler ? 'Keyboard Piano' : 'Keyboard Synth';
          
          // Re-encode ensuring the exact audio container type layout match
          const standardizedBlob = new Blob([rawBlob], { type: mimeTypeSelection });
          const objectUrl = URL.createObjectURL(standardizedBlob);

          // Send the payload saturating the common key variations
window.parent.postMessage({
  action: 'ADD_CLIP_TO_TIMELINE', // Ensure this matches the exact action string your multitrack listens for
  blob: standardizedBlob,       
  audioBlob: standardizedBlob,  
  audioUrl: objectUrl,          
  url: objectUrl,               
  trackName: trackName,
  name: trackName,
  mimeType: mimeTypeSelection
}, '*');

window.parent.postMessage({ action: 'SWITCH_APP', app: 'multitrack' }, '*');
          /*
          // We pass down trackName as explicit labels and the objectURL explicitly as the sound block target
          window.parent.postMessage({
            action: 'EXPORT_AUDIO_TO_TRACKS',
            audioBlob: standardizedBlob, 
            audioUrl: objectUrl,
            url: objectUrl,             // Fallback key mapping if it attempts text resolution
            trackName: trackName,
            name: trackName,
            mimeType: mimeTypeSelection
          }, '*');
          
          window.parent.postMessage({ action: 'SWITCH_APP', app: 'multitrack' }, '*');
          */
        } catch (err) {
          console.error("Recording acquisition failure:", err);
          document.getElementById('engine-status').innerText = "ERR REC";
        }
      }
    }

    window.addEventListener('message', (event) => {
      if (event.data.action === 'START_AUDIO') {
        isPlaying = true;
        document.getElementById('play-btn').innerText = "STOP";
      }
      if (event.data.action === 'STOP_AUDIO') {
        isPlaying = false;
        document.getElementById('play-btn').innerText = "PLAY";
      }
    });

    // ==========================================================================
    // 4. NOTE INTERACTION MECHANICS
    // ==========================================================================
    function handleNoteOn(element) {
      if (Tone.context.state !== 'running') Tone.start();
      element.classList.add('active');
      const targetNote = getTargetNoteString(element.dataset.baseNote);
      activeEngine.triggerAttack(targetNote);
    }

    function handleNoteOff(element) {
      if (element.classList.contains('active')) {
        element.classList.remove('active');
        const targetNote = getTargetNoteString(element.dataset.baseNote);
        activeEngine.triggerRelease(targetNote);
      }
    }

    updateParameters();
    updateFX();

    document.querySelectorAll('.key').forEach(key => {
      key.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleNoteOn(key);
      });
      key.addEventListener('touchend', (e) => {
        e.preventDefault();
        handleNoteOff(key);
      });
    });
  </script>
</body>
</html>
